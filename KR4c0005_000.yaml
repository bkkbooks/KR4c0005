front:
  text: 幽憂子集題詞古今文士竒窮未有如盧昇之之甚者夫其仕宦不逹則亦已耳沉疴永痼無復聊頼至自投魚腹中古来膏肓無此死法也昇之方始寝瘵自以僊方爲必可期嘗遇異人授以大丹㑹邅父䘮躃踴號慟丹輒吐出而疾轉増倫常之際天性之篤有足憐者母老身廢仰給交知如鄰舍隙光詎易長燃竊謂天地大矣無所不有或儷景争暉或埋烟剜骨或百靈供其驅遣或四大無以自容脆漏偶邅勢必任受無䖏訴屈安得以㨗足笑跛譏彼蹣􅘐自貽坑塹㢤早嵗秩滿棲遅山水間比疾篤買園繞水舎下又豫為墓依稀逹人之風若夫馴鳶病梨之賦五悲釋疾之文筆端尚存曷禁輸寫乃持議者訝其不能義命自安亦太甚矣因梓昇之集而詳掲之
  hash: sha256:93f965911bebd4edbbb8def10290cfeb542d53d1093bc6cfe307c8ad17cbfc4e
