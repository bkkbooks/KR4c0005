body:
  text: 石户主人張燮題幽憂子集七卷張燮識僅二卷今彚詩文共七卷盧照鄰本傳存二十卷近代永嘉單行詩賦參訂諸名公姓氏姚江施邦曜爾韜梁溪曹荃元宰定會稽曹惟才無奇甬東楊德周南仲較三山徐􅎾興公曹學佺能始閩漳王志道而弘盧化鰲爾騰黃道周幼玄魏呈潤中嚴溫陵池顯方直夫弟張紹科烴叔閲幽憂子集目録卷之一賦秋霖賦馴鳶賦窮魚賦并序雙槿樹賦同崔少監作并序病梨樹賦五言古詩詠史四首結客少年場行贈李榮道士早度分水嶺三月曲水宴得樽字王勃和詩得煙字附奉使益州至長安發鍾陽驛和王奭秋夜有所思望宅中樹有所思宿晉安寺干時春也慨然有江湖之思寄此贈柳九隴至望喜矚目言懷貽劍外知巳赤谷安禪師塔贈益府裴録事贈益府群官卷之二七言古詩失羣鴈并序行路難長安古意明月引懷仙引五言律劉生隴頭水巫山高芳樹雨雪曲昭君怨折楊柳梅花落關山月上之回紫騮馬戰城南十五夜觀燈入秦川界文翁講堂相如琴臺石鏡寺􅉝法司宅觀妓春晚山莊率題二首江中望月元日述懷益州城西張超亭觀妓還京贈别至陳倉曉晴望京邑晚渡滹沱敬贈魏大和吳侍御被使燕然七夕泛舟二首送梓州髙參軍還京大劒送别劉右史卷之三五言排律同臨津紀明府孤鴈西使兼送孟學士南逰送鄭司倉入蜀綿州官池贈别同賦灣字還赴蜀中貽示京邑逰好初夏日幽莊山莊休沐山林休日田家宴梓州南亭得池字山行寄劉李二參軍首春貽京邑文士贈許左丞從駕萬年宫晚渡渭橋寄示京邑逰好羈臥山中酬張少府柬之過東山谷口送幽州陳參軍赴任寄呈鄉曲父老哭金部韋郎中哭明堂裴簿同崔録事哭鄭員外五言絶句登玉淸曲池荷浴浪烏臨階竹含風蟬葭川獨泛送二兄入蜀宿玄武二首九隴津集逰昌化山精舍七言絶句登封大酺歌四首九月九日登玄武山旅眺王勃九月九日登玄武山附邵大震九月九日登玄武山附樂歌中和樂九章登封第一明堂第二東軍第三南郊第四中宮第五儲宮第六諸王第七公卿第八總歌第九卷之四騷五悲并序獄中學騷體卷之五騷釋疾并序卷之六序駙馬都尉喬君集序南陽公集序樂府雜詩序宴梓州南亭詩序宴鳳泉石翁神祠詩序七日綿州泛舟詩序楊明府過訪詩序􅍟問􅍟蜀父老問卷之七書與在朝諸賢書與洛陽名流朝士乞藥直書寄裴舍人諸公遺衣藥直書讚相樂夫人檀龕讚益州長史胡樹禮為亡女造畫讚碑益州至真觀主黎君碑附録盧照鄰小傳晉劉昫盧照鄰小傳宋宋祁豔情代郭氏答盧照鄰唐駱賓王遣事集評
