front:
  text: 幽憂子集題詞古今文士竒窮未有如盧升之之甚者夫其仕宦不逹則亦已耳沉疴永痼無復聊賴至自投魚腹中古來膏肓無此死法也升之方始寢瘵自以仙方為必可期嘗遇異人授以大丹會邅父喪躃踴號慟丹輒吐出而疾轉增倫常之際天性之篤有足憐者母老身廢仰給交知如鄰舍隙光詎易長燃竊謂天地大矣無所不有或儷景爭暉或埋煙剜骨或百靈供其驅遣或四大無以自容脆漏偶邅勢必任受無處訴屈安得以捷足笑跛譏彼蹣􅘐自貽坑塹哉早嵗秩滿棲遲山水間比疾篤買園繞水舍下又豫為墓依稀逹人之風若夫馴鳶病梨之賦五悲釋疾之文筆端尚存曷禁輸寫乃持議者訝其不能義命自安亦太甚矣因梓升之集而詳揭之
  hash: sha256:eaa924cb1ae48b0106b722f134fd8e979fed0b87a682c4a7a6c73089bb3e9067
