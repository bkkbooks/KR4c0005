front:
  text: 幽憂子集卷之一
  hash: sha256:32daeaff1d8945744e608905e948bac0c97fa167548675a13fc8d7855fe9d8f5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0005_SBCK_001-1a}
body:
  text: 唐范陽盧照鄰升之著明閩漳張燮紹和纂賦秋霖賦覽萬物兮竊獨悲此秋霖風橫天而瑟瑟雲覆海而沈沈居人對之憂不解行客見之思巳深若乃千井埋煙百㕓涵潦青苔被壁緑萍生道於時巷無人跡林無鳥聲野陰霾而因晦山幽曖而不明長塗未半茫茫漫漫莫不埋輪據鞍銜悽茹歎借如尼父去魯圍陳畏匡將饑不爨欲濟無梁問長沮與桀溺逢漢隂與楚狂長櫛風而沐雨永棲棲以遑遑及夫屈平既放登高一望湛湛江水悠悠千里泣故國之長楸見玄雲之四起嗟乎子卿北海伏波南川金河别鴈銅柱辭鳶關山夭骨霜木凋年眺窮隂兮斷地看積水兮連天别有東國儒生西都才客屋滿鉛槧家虛儋石茅棟淋淋蓬門寂寂蕪碧草於園徑聚緑塵於庖甓玉為粒兮桂為薪堂有琴兮室無人抗高情以出俗馳精義以入神論有能鳴之鴈書成已泣之麟覩皇天之淫溢孰不隅坐而含嚬已矣哉若夫繡轂銀鞍金杯玉盤坐卧珠璧左右羅紈流酒為海積肉為巒視襄陵而與昏墊曾不輟乎此歡豈知乎堯禹之臞瘠而孔墨之艱難馴鳶賦孕天然之靈質禀大塊之竒工嘴距足以自衛毛羽足以凌風懷九圍之逺志託萬里之長空隂雲低而含紫陽景升而帶紅經過巫峽之下惆悵彭門之東既而摧頽短翮寥落長想忌䝉莊之見欺哀武溪之莫往進謝扶搖之力退慙歸昌之響腐食多懼層巢無像屈猛性以自馴抱愁容而就養於是傍眺德門言栖仁路不踐髙梁之屋翔止吾人之樹聽鳴雞於月曉侣羣鵲於星暮狎蘭砌之高低玩荆扉之新故循廣庭之一息歷長簷而徑度若乃風去雨還河移月落徘徊亂於雙燕鳴舞均乎獨鶴乍嘯聚於霞莊時追飛於雲閣荷大德之純粹將輕姿之陋薄思一報之無階欣百齡之有託窮魚賦并序余曾有橫事𬒳拘為群小所使將致之深議友人救護得免竊感趙一窮鳥之事遂作窮魚賦常思報德故冠之篇首云有一巨鱗東海波臣洗靜月浦涵丹錦津映紅蓮而得性戲碧浪以全身宕而失水届于陽瀕漁者觀焉乃具竿索集朋黨鳬趨雀躍風馳電往競下任公之釣爭陳豫且之網螻蟻見而甘心獱獺聞而抵掌於是長舌利嘴曳綸爭鈎拖鬐挫鬛撫背扼喉動搖不可騰躍無繇有懷纖潤寧望洪流大鵬過而哀之曰昔豫為鯤也與爾遊乎自余羽化之後子其遺孤俄撫翼而下負之而趨南浮七澤東泛五湖是魚也巳相忘於江海而漁者猶悵望於泥塗雙槿樹賦同崔少監作并序日昨於著作局見諸著作競寫雙槿樹賦蓬萊山上即對神仙藝香閣前仍觀祕寶金懸秦市楊子見而無言𥿄貴洛城陸生聞而罷笑故知柔條朽幹吹噓變其死生落葉凋花剪拂成其光價方且傳石渠之故事得槿樹之新名足以脂粉仙臺丹青祕府者也若布衣藜杖巖栖藿食居周室而非史處漢代而無田學涉蕪淺文多瞽漏宜其屏竄用其靜默蓋窮而思達人之情也卑而應髙物之理也故疾雷作而蟄蟲飛浮雲興而石舄潤不可廢也雖云聖朝多士而公實居之草澤有人亦國家之美事故復奬刷芻鄙作雙槿樹賦詞義猥薄退增慙靦賦曰方丈蓬萊邈矣悠哉藝扄石室圖天揆日若乃羲和掌日太史觀星銅渾玉策寶笥金銘地則圖書之府人則神仙之靈中有芳蕣鬱鬱亭亭徒觀其兩砌分植雙階並耀葉鏤五衢榮回四照紛廣庭之靃靡隱重廊之窈窕青陸至而鶯啼朱陽升而花笑紫蒂紅蕤玉蕊蒼枝露華的皪風色徘徊采粲照灼妸娜隈緌迫而視之鳴環動珮歌扇開遠而望之連珠合璧星漢回狀仙人之羽蓋疑佚女之瑶臺寂寞攸利栖間此地委命卷舒隨時榮悴外無嬰夭之禍內有逍遙之致朝朝暮暮落復開嵗嵗年年紅似翠若夫遊蜂戲蝶封其蕚輕煙弱霧絡其條去不謂之損來不謂之饒故能出君子之殊俗入詩人之舊謠齊顯昧於兩曜效生死於一朝同喪我之非我固雖凋而不凋則有亭伯儒門令思詩友翰苑擴其吞夢文鋒高而照斗詠蕪滋之朝夕悲積薪之先後縟繡起于緹紡煙霞生於灌莽豈與巖幽弱蓧澗底枯松徒冒霜而停雪空集鳳而吟龍詎得奉仙闈之廣價連筆匠之為容已矣哉東方生聞而嘆曰故年花落不留人今年花發非故春倐兮夕隕忽兮朝新侏儒何功兮短飽曼倩何負兮長貧聊寄詞於庭樹倘有感於平津病梨樹賦并序癸酉之嵗余卧病於長安光德坊之官舍父老云是鄱陽公主之邑司昔公主未嫁而卒故其邑廢時有處士孫君思邈居之君道洽今古學有數術髙談正一則古之蒙莊子深入不二則今之維摩詰及其推步甲子度量乾坤飛鍊石之竒洗胃腸之妙則其甘公洛下閎安期先生扁鵲之儔也自云開皇辛酉嵗生今年九十二矣詢之鄉里咸云數百嵗人矣共語周齊間事歷歷眼見以此參之不啻百嵗人也然猶視聽不衰神形甚茂可謂聰明博達不死者矣余年垂強仕則有幽憂之疾椿囷之性何其遼哉于時天子避暑甘泉邈亦徵詣行在余獨病卧兹邑閴寂無人伏枕十旬閉門三月庭無衆木唯有病梨樹一株圍才數握髙僅盈丈花實憔悴似不任乎嵗寒枝葉零丁絶有意乎朝暮嗟乎同託根於膏壤俱禀氣於太和而修短不均榮枯殊貫豈賦命之理得之自然將資生之化有所偏及樹猶如此人何以堪有感於懷賦之云耳天象平運方祗廣植挺芳桂於月輪橫扶桑於日域建木聳靈丘之上蟠桃生巨海之側細葉枝連洪柯條直齊天地之一指任烏兔之棲息或垂陰萬𤱔或結子千年何偏施之雨露何獨厚之風煙愍兹珍木離離幽獨飛茂實于河陽傳芳名於金谷紫澗稱其殊㫖玄光表其仙族爾生何為零丁若斯無輪桷之可用無棟梁之可施進無違於斤斧退無競於班倕無庭槐之生意有巖桐之死枝爾其髙才數仞圍僅盈尺修幹罕雙枯條每隻葉病多紫花凋少白夕鳥怨其巢危秋蟬悲其翳窄怯衡颷之搖落忌炎景之臨迫既而地歇蒸霧天收耀靈西秦明月東井流星憔悴孤影徘徊直形狀金莖之的的疑石柱之亭亭若夫西海夸父之林南海蚩尤之樹莫不摩霄拂日藏雲吐霧别有橋邉朽柱天上靈槎年年嵗嵗無葉無花榮辱兩齊吉凶同軌寧守雌以外喪不修襮而內否亦猶縱酒髙賢佯彺君子為其吻合置其憂喜生非我生物謂之生死非我死谷神不死混彭殤于一觀庶筌蹄於兹理五言古詩詠史四首季生昔未達身辱功不成髠鉗為臺隸灌園變姓名幸逢滕將軍兼遇曹丘生漢祖廣招納一朝拜公卿百金孰云重一諾良匪輕廷議斬樊噲群公寂無聲處身孤且直遭時坦而平丈夫當如此唯唯何足榮大漢昔云季小人道遂振玉帛委奄尹斧鑕嬰縉紳邈哉郭先生卷舒得其真雍容謝朝廷談笑奬人倫在晦不絶俗處亂不為親諸矦不得友天子不得臣沖情甄負甑重價折角巾悠悠天下士相送洛橋津誰知仙舟上寂寂無鄰四公業負竒志交結盡才雄良田四百頃所食常不充一為侍御史慷慨說何公何公何為敗吾謀適不同仲穎恣殘忍廢興良在躬死人如亂麻天子如轉蓬干戈及黃屋荆棘生紫宫鄭生運其謀將以清國戎時來命不遂脫身歸山東凛凛千載下穆然懷清風昔有平陵男姓朱名阿游直髮上衝冠壯氣橫三秋願得斬馬劒先斷佞臣頭天子玉檻折將軍丹血流捐生不肻拜視死其若休歸來教鄉里童蒙遠相求弟子數百人散在十二州三公不敢吏五鹿何能酬名與日月懸義與天壤儔何必披執㦸區區在封矦偉哉曠達士知命固不憂結客少年場行長安重遊俠洛陽富才雄玉劔浮雲騎金鞭明月弓鬪雞過渭北走馬向關東孫賓遙見待郭解暗相通不受千金爵誰論萬里功將軍下天上虜騎入雲中烽火夜似月兵氣曉成虹橫行徇知已負羽遠從戎龍旌昏朔霧鳥陳捲胡風追奔瀚海咽戰罷陰山空歸來謝天子何如馬上翁贈李榮道士錦節銜天使瓊仙駕羽君投金翠山曲奠璧清江濆圓洞開丹鼎方壇聚綘雲寶資一作貺幽難識空歌迥易分風搖十洲影日亂九江文敷誠歸上帝應詔佐明君獨有南冠客耿耿泣離羣遙看八㑹所真氣曉氤氲早度分水嶺丁年遊蜀道斑鬢向長安徒費周王粟空彈漢吏冠馬蹄穿欲盡貂裘敝故一作轉寒層氷橫九折積石凌七盤重溪既下漱峻峰亦上干隴頭聞戍鼓嶺外咽飛湍瑟瑟松風急蒼蒼山月圓傳語後來者斯路誠獨難三月曲水宴得樽字風煙彭澤里山水仲長園繇來棄銅墨本自重琴樽髙情邈不嗣雅道今復存有美光時彥養德坐山樊門開芳杜徑室距桃花源公子黃金勒仙人紫氣軒長懷去城市髙詠狎蘭蓀連沙飛白鷺孤㠘嘯玄猿日影巖前落雲花江上翻興闌車馬散林塘夕鳥喧王勃和詩得煙字附彭澤官初去河陽賦始傳田園歸舊國詩酒間長筵列室窺丹洞分樓瞰紫煙縈回豆津渡出沒控郊鄽鳯琴調上客龍轡儼羣仙松石偏宜古藤蘿不記年重簷交密樹復磴擁危泉抗石晞南嶺乘沙渺北川傅巖來築處磻磎入釣前日斜真趣遠幽思夢涼蟬奉使益州至長安發鍾陽驛躋險方未夷乘春聊騁望落花赴丹谷奔流下青嶂葳蕤曉樹滋滉漾春江漲平川看釣侣㣣徑聞樵唱蝶戲緑苔前鶯歌白雲上耳目多異賞風煙有竒狀峻阻將長城髙標吞巨舫聫翩事羈靮辛苦勞疲恙夕濟幾潺湲晨登每惆悵誰念復芻狗山河獨偏喪和王奭秋夜有所思寂寂南軒夜悠然懷所知長河落鴈苑明月下鯨池鳯臺有清曲此曲何人吹丹唇間玉齒妙響入雲涯窮巷秋風葉空庭寒露枝勞歌欲有和星鬢巳將垂望宅中樹有所思我家有庭樹秋葉正離離上舞雙棲鳥中秀合歡枝勞思復勞望相見不相知何當共攀折歌笑此堂垂宿晉安寺聞有弦歌地穿鑿本多竒遊人試一覽臨玩果忘疲窗橫暮捲落一作葉簷臥古生枝舊石開紅蘚新荷覆緑池孤猿稍斷絶宿百一作鳥復參差泛灔月華曉徘徊星鬢垂今日刪書客悽惶君詎知于時春也慨然有江湖之思寄贈柳九隴提琴一萬里負書三十年晨攀偃蹇樹暮宿清泠泉翔禽鳴我側旅獸過我前無人且無事獨酌還獨眠遙聞彭澤宰髙弄武城弦形骸寄文墨意氣託神仙我有壺中要題為物外篇將以貽好道道遠莫致旃相思勞日夜相望阻風煙坐惜春華晚徒令客思懸水去東南地氣凝西北天關山悲蜀道花鳥憶秦川天子何時問公卿本亦憐自哀還自樂歸藪復歸田海屋銀為棟雲車電作鞭倘遇鸞將鶴誰論貂與蟬萊洲頻度淺桃實幾成圓寄言飛鳬舄嵗晏共聯翩至望喜矚目言懷貽劔外知巳聖圖夷九折神化掩三分緘愁赴蜀道題拙奉虞薰隱轔度深谷遙裊上高雲碧流遞縈注青山互紏紛澗松咽風緒巖花濯露文思北常依馭圖南每喪羣上四句世本無以無繇召宣室何以答吾君赤谷安禪師塔獨坐巖之曲悠然無俗氛酌酒呈丹桂思詩贈白雲烟霞朝晚聚猿鳥嵗時聞水華競秋色山翠含夕曛高談十二部細核五千文如如數冥昧生生理氤氳古人有糟粕輪扁情未分且當事芝术從吾所好云贈益府裴録事忽忽嵗云暮相望限風烟長歌欲對酒危坐遂停弦停弦變霜露對酒懷朋故朝看桂蟾晚夜聞鴻鴈度鴻度何時還桂晚不同攀浮雲映丹壑明月滿青山青山雲路深丹壑月華臨耿耿離憂積空令星鬢侵贈益府羣官一鳥自北燕飛來向西蜀單棲劒門上獨舞崑民一作山足昂藏多古貌哀怨有新曲羣鳳從之遊問之何所欲答言寒鄉子飄颻萬餘里不識惡木枝不飲盜泉水常思稻粱遇願栖梧桐樹智者不我邀愚夫余不顧所以成獨立耿耿嵗云暮日夕苦風霜思歸赴洛陽羽翮毛衣短關山道路長明月流客思白雲迷故鄉誰能借風便一舉凌蒼蒼
