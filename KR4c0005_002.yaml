front:
  text: 幽憂子集巻之二
  hash: sha256:204926a9302ddb4c9fc0fd08601ba8646fa23a896249f2a824d8ea559a903233
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0005_SBCK_002-1a}
body:
  text: 唐范陽盧照隣昇之著明閩漳張爕紹和纂七言古詩失羣鴈并序温縣明府以鴈詩垂示余以為古之郎官出宰百里今之墨綬入應千官事止鴈行未宜傷歎至如羸臥空巖者乃可為失羣慟耳聊因伏枕多暇以斯文應之三秋北地雪皚皚萬里南翔渡海來欲隨石燕沈湘水試逐銅烏繞帝䑓帝䑓銀闕距金塘中間鵷鷺巳成行先過上苑傳書信暫下中洲戲稻粱虞人負繳來相及齊客虚弓忽見傷毛翎頻頓顦顇一作飛無力羽翮摧頽君不識唯有莊周解愛鳴復道郊歌重竒色惆悵驚思悲未已徘徊自憐中㒺極傳聞有鳥集朝陽詎勝仙鳬邇帝鄉雲間海上應鳴舞逺得鵾弦猶獨撫金龜全寫中牟印玉鵠當變萊蕪釡願君弄影鳳皇池時憶籠中摧折羽行路難君不見長安城北渭橋邉枯木横槎臥古田昔日含紅復含紫常時畱霧亦畱煙春景春風花似雪香車玉轝恒闐咽若個遊人童一作不競攀若箇娼家不來折娼家寳袜蛟龍帔公子銀鞍千萬騎黄鶯一一向花嬌青鳥雙雙将子戲千尺長條百尺枝月桂星榆相蔽虧珊瑚葉上鴛鴦鳥鳯凰巢裏雛鵷兒巢傾枝折鳳歸去條枯葉落任風吹一朝憔悴無人問萬古摧殘君詎知人生貴賤無終始倐忽須臾難久恃誰家能駐西山日誰家能堰東流水漢家陵樹滿秦川行來行去盡哀憐自昔公卿二千石咸擬榮華一萬年不見朱唇将白玉一作貌唯聞青棘與黄泉金貂有時須換酒玉麈恒搖莫計錢寄言坐客神仙署一生一死交情䖏蒼龍闕下君不留白鶴山頭我應去雲間海上邈難期赤心㑹合在何時但願堯年一百萬長作巢由也不辭長安古意長安大道連狹斜青牛白馬七香車玉輦縱横過主第金鞭絡繹向矦家龍銜寳葢承朝日鳳吐流蘇帶晚霞百丈遊絲爭繞樹一羣嬌鳥共啼花啼花戲蝶千門側碧樹銀䑓萬種色複道交牕作合歡雙闕連甍垂鳳翼梁家畵閣天中起漢帝金莖雲外直樓前相望不相知陌上相逢詎相識借問吹簫向紫煙曽經學舞度芳年得成比目何辭死願作鴛鴦不羨仙比目鴛鴦真可羨雙去雙來君不見生憎帳額繡孤鸞好取門簾帖雙燕雙燕雙飛繞畫梁羅幃翠被鬱金香片片行雲着蟬鬢纖纖初月上鴉黄鴉黄粉白車中出含嬌含態情非一妖童寳馬鐵連錢娼婦盤龍金屈膝御史府中烏夜啼廷尉門前雀欲棲隠隠朱城臨玉道遙遙翠幰没金堤挾彈飛鷹杜陵北探丸借客渭橋西俱邀俠客芙蓉劔共宿娼家桃李蹊娼家日暮紫羅裙清歌一囀日氛氲北堂夜夜人如月南陌朝朝騎似雲南陌北堂連北里五劇三條控三市弱桺青槐拂地垂佳氣紅塵暗天起漢代金吾千騎來翡翠屠蘇鸚鵡杯羅襦寳帶爲君解燕歌趙舞爲君開别有豪華稱將相轉日回天不相讓意氣繇來排灌夫専權判不容蕭相専權意氣本豪雄青虹紫燕㘴春生一作風自言歌舞長千載自謂驕奢凌五公節物風光不相待桑田碧海須臾改昔時金階白玉堂即金惟見青松在寂寂寥寥揚子居年年嵗嵗一牀書獨有南山桂花發飛來飛去襲人裾明月引洞庭波起兮鴻鴈翔風瑟瑟兮野蒼蒼浮雲捲靄明月流光荆南兮趙北碣石兮瀟湘澄清規於萬里照離思於千行横桂枝於西第繞菱花於北堂高樓思婦飛盖君王文姬絶域侍子他鄉見胡鞍之似練知漢劔之如霜試登髙而騁極一作目莫不變而迴腸懐仙引若有人兮山之曲駕青虬兮乗白鹿徃從之遊願心足披澗户訪巖軒石瀬潺湲横石徑松蘿羃䍥掩松門下空濛而無鳥上巉巗而有㣪懷飛閣度飛梁休余馬於幽谷掛余冠於夕陽曲復曲兮煙莊邃行復行兮天路長修途杳其未半飛雨忽以茫茫山坱軋磴連褰攀石壁而無據泝泥谿而不前向無情之白日竊有恨於皇天迴行遵故道通川遍流潦迴首望羣峰白雲雪一作正溶溶珠為闕兮玉為樓青雲盖兮紫霜裘天長地久時相憶千齡萬代一來遊五言律詩劉生劉生氣不平抱劔欲專征報恩爲豪俠死難在横行翠羽装劔刀一作鞘黄金鏤飾一作馬纓但令一顧重不恡百身輕隴頭水隴阪髙無極征人一望鄉闗河别去水沙塞斷歸腸馬繫千年樹旌懸九月霜從來共嗚咽皆是爲勤王巫山高巫山望不極望望下朝氛莫辨啼猿樹徒看神女雲驚濤亂水脈驟雨暗峰文霑裳即此地况復遠思君芳樹芳樹本多奇年華復在斯結翠成新幄開紅滿故枝風歸花歴亂日度影參差容色朝朝落思君君不知雨雪曲虜騎三秋入闗雲萬里平雪似胡沙暗氷如漢月明高闕銀為闕長城玉作城節旄零落盡天子不知名昭君怨合殿恩中絶交河使漸稀肝腸隨玉輦形影向金微漢地宫一作草應綠胡庭沙正飛願逐三秋鴈年年一度歸折楊桺倡樓啓曙扉楊栁正依依鶯啼知嵗隔條變識春歸露葉凝愁黛風花亂落一作舞衣攀折将安寄軍中音信稀梅花落梅院嶺一作花初發天山雪未開雪䖏疑花滿花邉似雪迴因風入舞袖雜粉向粧䑓匈奴幾萬里春至不知來闗山月塞垣通碣石虜障抵祈連相思在萬里明月正孤懸影移金岫北光斷玉門前寄信閨中婦時愁一作㸔鴻鴈天上之囘囘中道路險蕭闗烽堠多五營屯北右一作地萬乗出西河單于拜玉璽天子按雕戈振旅汾川曲秋風横大歌紫騮馬騮馬照金鞍轉戰入皐蘭塞門風稍急長城水正寒雪暗鳴珂重山頭噴玉難不辭橫絶漠流血幾時乾戰城南将軍出紫塞冐頓在烏貪笳喧鴈門北陣翼龍城南琱弓夜宛轉鐡騎曉驂驔應須駐白日為待戰方酣十五夜觀燈錦里開芳宴蘭缸豔早年縟綵遙分地繁光逺綴天接漢疑星落依樓似月懸别有千金笑來映九枝前入秦川界隴阪長無極蒼山望不窮石逕縈疑斷回流映似空花開綠野霧鶯囀紫巖風春芳勿遽盡留賞故人同文翁講堂錦里淹中館岷山稷下亭空梁無燕雀古壁有丹青槐落猶疑市苔深不辨銘良哉二千石江漢表遺靈相如琴䑓聞有雍容地千年無四隣園院風煙古池䑓松檟春雲疑作賦客月似聴琴人寂寂啼鶯䖏空傷遊子神石鏡寺古墓芙蓉塔神銘松栢煙鸞沈仙鏡底花沒梵輪前鉢衣千古佛寳月兩重懸隠隠香䑓夜鐘聲徹九天辛法司宅觀妓南國佳人至北堂羅薦開長裙隨鳯管促柱送鸞杯雲光身後落雪態掌中廻到愁金谷晚不怪玉山頽春晚山莊率題二首顧步三春晩田園四望通遊絲橫惹樹戲蝶亂依叢竹懶偏宜水花狂不待風唯餘詩酒意當了一生中田家無四隣獨坐一園春鶯啼非選樹魚戲不驚綸山水彈琴盡風花酌酒頻年華巳可樂高興復畱人江中望月江水向涔陽澄澄寫月光鏡圓珠溜澈弦滿箭波長沈鈎搖兎影浮桂動丹芳延照相思夕千里共霑裳元日述懷筮仕無中秩歸畊有外臣人歌小嵗酒花舞大唐春草色迷三徑風光動四隣願得長如此年年物候新益州城西張超亭觀妓落日明歌席行雲逐舞人江前飛暮雨梁上下輕塵冶服看疑畫妝樓望似春高車勿遽返長袖欲相親還京贈别風月清江夜山水白雲朝萬里同為客三秋契不凋戲鳬分斷岸歸騎别髙標一去仙橋道還望錦城遙至陳倉曉晴望京邑拂曙驅飛傳初晴帶曉涼霧歛長安樹雲歸仙帝鄉澗流漂素沫巗景靄朱光今朝好風色延瞰極天莊晚渡滹沱敬贈魏大津谷朝行逺冰川夕望曛霞明深淺浪風卷去來雲澄波泛月影激浪聚沙文誰忍仙舟上携手獨思君和吳侍御被使燕然春歸龍塞北騎指鴈門垂胡笳折楊桺漢使採燕支戌城聊一望花雪幾參差闗山有新曲應向笛中吹七夕泛舟二首汀葭肅徂暑江樹起初涼水疑通織室舟似泛仙潢連橈渡急響鳴棹下浮光日晩菱歌唱風烟滿夕陽風杼秋期至鳬舟野望開微吟翠塘側延想白雲隈石似支機罷槎疑犯宿來天潢殊漫漫日暮獨悠哉送梓州髙叅軍還京京落風塵逺褒斜煙霧深北遊君似智南飛我異禽别路琴聲斷秋山猿鳥吟一乖青巗酌空佇白雲心大劒送别劉右史金碧禺山逺闗梁蜀道難相逢屬晚嵗相送動征鞍地咽綿川冷雲凝劔閣寒倘遇忠孝所為道憶長安
