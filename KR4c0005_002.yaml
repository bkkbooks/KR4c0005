front:
  text: 幽憂子集卷之二
  hash: sha256:f29494e52ef64f2e1e5b9c76f11d8d00f0d9576e11d76496c26cce2446edee80
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0005_SBCK_002-1a}
body:
  text: 唐范陽盧照鄰升之著明閩漳張燮紹和纂七言古詩失羣鴈并序溫縣明府以鴈詩垂示余以為古之郎官出宰百里今之墨綬入應千官事止鴈行未宜傷歎至如羸臥空巖者乃可為失羣慟耳聊因伏枕多暇以斯文應之三秋北地雪皚皚萬里南翔渡海來欲隨石燕沈湘水試逐銅烏繞帝臺帝臺銀闕距金塘中間鵷鷺巳成行先過上苑傳書信暫下中洲戲稻粱虞人負繳來相及齊客虛弓忽見傷毛翎頻頓憔悴一作飛無力羽翮摧頽君不識唯有莊周解愛鳴復道郊歌重竒色惆悵驚思悲未已徘徊自憐中罔極傳聞有鳥集朝陽詎勝仙鳬邇帝鄉雲間海上應鳴舞逺得鵾弦猶獨撫金龜全寫中牟印玉鵠當變萊蕪釡願君弄影鳳皇池時憶籠中摧折羽行路難君不見長安城北渭橋邉枯木橫槎臥古田昔日含紅復含紫常時留霧亦留煙春景春風花似雪香車玉輿恆闐咽若個遊人童一作不競攀若箇娼家不來折娼家寶襪蛟龍帔公子銀鞍千萬騎黃鶯一一向花嬌青鳥雙雙將子戲千尺長條百尺枝月桂星榆相蔽虧珊瑚葉上鴛鴦鳥鳯凰巢裏雛鵷兒巢傾枝折鳳歸去條枯葉落任風吹一朝憔悴無人問萬古摧殘君詎知人生貴賤無終始倐忽須臾難久恃誰家能駐西山日誰家能堰東流水漢家陵樹滿秦川行來行去盡哀憐自昔公卿二千石咸擬榮華一萬年不見朱唇將白玉一作貌唯聞青棘與黃泉金貂有時須換酒玉麈恆搖莫計錢寄言坐客神仙署一生一死交情處蒼龍闕下君不留白鶴山頭我應去雲間海上邈難期赤心會合在何時但願堯年一百萬長作巢由也不辭長安古意長安大道連狹斜青牛白馬七香車玉輦縱橫過主第金鞭絡繹向矦家龍銜寶蓋承朝日鳳吐流蘇帶晚霞百丈遊絲爭繞樹一羣嬌鳥共啼花啼花戲蝶千門側碧樹銀臺萬種色復道交窗作合歡雙闕連甍垂鳳翼梁家畫閣天中起漢帝金莖雲外直樓前相望不相知陌上相逢詎相識借問吹簫向紫煙曽經學舞度芳年得成比目何辭死願作鴛鴦不羡仙比目鴛鴦真可羡雙去雙來君不見生憎帳額繡孤鸞好取門簾帖雙燕雙燕雙飛繞畫梁羅幃翠被鬱金香片片行雲著蟬鬢纖纖初月上鴉黃鴉黃粉白車中出含嬌含態情非一妖童寶馬鐵連錢娼婦盤龍金屈膝御史府中烏夜啼廷尉門前雀欲棲隱隱朱城臨玉道遙遙翠幰沒金堤挾彈飛鷹杜陵北探丸借客渭橋西俱邀俠客芙蓉劔共宿娼家桃李蹊娼家日暮紫羅裙清歌一囀日氛氲北堂夜夜人如月南陌朝朝騎似雲南陌北堂連北里五劇三條控三市弱柳青槐拂地垂佳氣紅塵暗天起漢代金吾千騎來翡翠屠蘇鸚鵡杯羅襦寶帶為君解燕歌趙舞為君開别有豪華稱將相轉日回天不相讓意氣繇來排灌夫専權判不容蕭相専權意氣本豪雄青虹紫燕坐春生一作風自言歌舞長千載自謂驕奢凌五公節物風光不相待桑田碧海須臾改昔時金階白玉堂即金惟見青松在寂寂寥寥揚子居年年嵗嵗一牀書獨有南山桂花發飛來飛去襲人裾明月引洞庭波起兮鴻鴈翔風瑟瑟兮野蒼蒼浮雲捲靄明月流光荆南兮趙北碣石兮瀟湘澄清規於萬里照離思於千行橫桂枝於西第繞菱花於北堂高樓思婦飛蓋君王文姬絶域侍子他鄉見胡鞍之似練知漢劔之如霜試登髙而騁極一作目莫不變而回腸懷仙引若有人兮山之曲駕青虬兮乘白鹿往從之遊願心足披澗户訪巖軒石瀨潺湲橫石徑松蘿羃䍥掩松門下空濛而無鳥上巉巗而有㣪懷飛閣度飛梁休余馬於幽谷挂余冠於夕陽曲復曲兮煙莊邃行復行兮天路長修途杳其未半飛雨忽以茫茫山坱軋磴連褰攀石壁而無據泝泥溪而不前向無情之白日竊有恨於皇天回行遵故道通川遍流潦回首望羣峰白雲雪一作正溶溶珠為闕兮玉為樓青雲蓋兮紫霜裘天長地久時相憶千齡萬代一來遊五言律詩劉生劉生氣不平抱劔欲專征報恩為豪俠死難在橫行翠羽裝劔刀一作鞘黃金鏤飾一作馬纓但令一顧重不吝百身輕隴頭水隴阪髙無極征人一望鄉關河别去水沙塞斷歸腸馬繫千年樹旌懸九月霜從來共嗚咽皆是為勤王巫山高巫山望不極望望下朝氛莫辨啼猿樹徒看神女雲驚濤亂水脈驟雨暗峰文霑裳即此地况復遠思君芳樹芳樹本多奇年華復在斯結翠成新幄開紅滿故枝風歸花歷亂日度影參差容色朝朝落思君君不知雨雪曲虜騎三秋入關雲萬里平雪似胡沙暗氷如漢月明高闕銀為闕長城玉作城節旄零落盡天子不知名昭君怨合殿恩中絶交河使漸稀肝腸隨玉輦形影向金微漢地宫一作草應緑胡庭沙正飛願逐三秋鴈年年一度歸折楊柳倡樓啓曙扉楊栁正依依鶯啼知嵗隔條變識春歸露葉凝愁黛風花亂落一作舞衣攀折將安寄軍中音信稀梅花落梅院嶺一作花初發天山雪未開雪處疑花滿花邉似雪回因風入舞袖雜粉向粧臺胸奴幾萬里春至不知來關山月塞垣通碣石虜障抵祈連相思在萬里明月正孤懸影移金岫北光斷玉門前寄信閨中婦時愁一作看鴻鴈天上之回回中道路險蕭關烽堠多五營屯北右一作地萬乘出西河單于拜玉璽天子按雕戈振旅汾川曲秋風橫大歌紫騮馬騮馬照金鞍轉戰入皋蘭塞門風稍急長城水正寒雪暗鳴珂重山頭噴玉難不辭橫絶漠流血幾時乾戰城南將軍出紫塞冒頓在烏貪笳喧鴈門北陳翼龍城南雕弓夜宛轉鐡騎曉驂驔應須駐白日為待戰方酣十五夜觀燈錦里開芳宴蘭缸豔早年縟綵遙分地繁光逺綴天接漢疑星落依樓似月懸别有千金笑來映九枝前入秦川界隴阪長無極蒼山望不窮石徑縈疑斷回流映似空花開緑野霧鶯囀紫巖風春芳勿遽盡留賞故人同文翁講堂錦里淹中館岷山稷下亭空梁無燕雀古壁有丹青槐落猶疑市苔深不辨銘良哉二千石江漢表遺靈相如琴臺聞有雍容地千年無四鄰園院風煙古池臺松檟春雲疑作賦客月似聽琴人寂寂啼鶯處空傷遊子神石鏡寺古墓芙蓉塔神銘松柏煙鸞沈仙鏡底花沒梵輪前鉢衣千古佛寶月兩重懸隱隱香臺夜鐘聲徹九天辛法司宅觀妓南國佳人至北堂羅薦開長裙隨鳯管促柱送鸞杯雲光身後落雪態掌中回到愁金谷晚不怪玉山頽春晚山莊率題二首顧步三春晚田園四望通遊絲橫惹樹戲蝶亂依叢竹懶偏宜水花狂不待風唯餘詩酒意當了一生中田家無四鄰獨坐一園春鶯啼非選樹魚戲不驚綸山水彈琴盡風花酌酒頻年華巳可樂高興復留人江中望月江水向涔陽澄澄寫月光鏡圓珠溜徹弦滿箭波長沈鈎搖兔影浮桂動丹芳延照相思夕千里共霑裳元日述懷筮仕無中秩歸耕有外臣人歌小嵗酒花舞大唐春草色迷三徑風光動四鄰願得長如此年年物候新益州城西張超亭觀妓落日明歌席行雲逐舞人江前飛暮雨梁上下輕塵冶服看疑畫妝樓望似春高車勿遽返長袖欲相親還京贈别風月清江夜山水白雲朝萬里同為客三秋契不凋戲鳬分斷岸歸騎别髙標一去仙橋道還望錦城遙至陳倉曉晴望京邑拂曙驅飛傳初晴帶曉涼霧斂長安樹雲歸仙帝鄉澗流漂素沫巗景靄朱光今朝好風色延瞰極天莊晚渡滹沱敬贈魏大津谷朝行逺冰川夕望曛霞明深淺浪風卷去來雲澄波泛月影激浪聚沙文誰忍仙舟上携手獨思君和吳侍御被使燕然春歸龍塞北騎指鴈門垂胡笳折楊柳漢使採燕支戌城聊一望花雪幾參差關山有新曲應向笛中吹七夕泛舟二首汀葭肅徂暑江樹起初涼水疑通織室舟似泛仙潢連橈渡急響鳴棹下浮光日晚菱歌唱風煙滿夕陽風杼秋期至鳬舟野望開微吟翠塘側延想白雲隈石似支機罷槎疑犯宿來天潢殊漫漫日暮獨悠哉送梓州髙參軍還京京落風塵逺褒斜煙霧深北遊君似智南飛我異禽别路琴聲斷秋山猿鳥吟一乖青巗酌空佇白雲心大劒送别劉右史金碧禺山逺關梁蜀道難相逢屬晚嵗相送動征鞍地咽綿川冷雲凝劔閣寒倘遇忠孝所為道憶長安
