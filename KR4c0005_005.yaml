front:
  text: 幽憂子集卷之五
  hash: sha256:d49139eb2f22f52f9f6d26595808ae949df737618be3b62596fe27049107e433
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0005_SBCK_005-1a}
body:
  text: 唐范陽盧照鄰升之著明閩漳張燮紹和纂騷釋疾文并序余羸臥不起行已十年宛轉匡床婆娑小室未攀偃蹇桂一臂連踡不學邯鄲步兩足匍匐寸步千里咫尺山河每至冬謝春歸暑闌秋至雲壑改色煙郊變容輒輿出户庭悠然一望覆幬雖廣嗟不容乎此生亭育雖繁恩已絶乎斯代賦命如此幾何可憑今為釋疾文三篇以貽諸好事蓋作易者其有憂患乎刪書者其有栖遑乎國語之作非瞽叟之事乎騷文之興非懷沙之痛乎吾非斯人之徒歟安可默而無述故作頌曰粵若粵若稽古帝列仙兮逺矣大矣臣太嶽矣欽哉良哉有太公兮卷舒龍豹奄經營乎四履有先生兮乘騎日月期汗漫乎九垓尚書抗節兮屬炎靈之道喪中郎含章兮遇金行之綱頽彼聖賢之相續信古往而今來人何代而不貴代何人而不才鬱律崛岉兮似崑陵之玉石泮渙粲爛兮象星漢之昭回爾其為廣也碧海雲蒸而地合爾其為峻也赤城霞起而天開暨中朝之顛覆家不墜乎良箕紹金柯而玉秀穆蘭馨而菊滋彌九葉而逮余兮代增麗以光熙清風振乎終古妙譽薰乎當時皇考慶余以弄璋兮肇錫豫以嘉詞名余以照鄰字余以升之余幼服此殊惠兮遂閲禮而聞詩於是裹糧尋師褰裳訪古探舊篆於南越得遺書於東魯意有缺而必刋簡無文而咸補入陳適衛百舍不厭其栖遑纍繭重胝千里不辭於勞苦既而屠龍適就刻鵠初成下筆則煙飛雲動落紙則鸞回鳳驚通李膺而竊價造張華而假成郭林宗聞而心服王夷甫見而神傾俯仰談笑顧盻縱橫自謂明主以令僕相待朝廷以黃散為經及觀國之光利用賓王謁龍旗於武帳揮鳳藻於文昌先朝好吏豫方學於孔墨今上好法豫晚受乎老莊彼圓鑿而方枘吾知齟齬而無當是時也天子按劒方有事於八荒駕風輪而梁弱水飛日馭而苑扶桑戈船萬計兮連屬鐵騎千羣兮啓行文臣鼠竄猛士鷹揚故吾甘栖栖以赴蜀分默默以從梁其後雄圖甫畢登封禮日方欲訪髙議於雲臺考竒文於石室銷兵車兮為農器休牛馬兮崇儒術屢下蒲帛之書值余有幽憂之疾蓋有才無時亦命也有時無命亦命也時也命也自前代而痛諸道之乖也則賢人君子伏斧鑕而不暇時之來也則屠夫餓隸作王矦而有餘三人猖狂兮為奴為戮八子狼狽兮為醢為葅長劒以撝尚想華亭之鶴孤舟欲近遙憶閶門之魚史遷下於蠶室鄧艾徵於檻車康既幽而愧孫登宣屢困而慙寧蘧故有閉門少事蹈滄海而辭組開卷獨得歸茂陵而著書起清流之浩漫長願嗟乎靈胥重曰積怨兮纍息茹恨兮吞悲怨復怨兮坎壈乎今之代愁莫愁兮侘傺乎斯之時皇穹何親兮誕而生之后土何私兮鞠而育之何故邀余以好學何故假余以多辭何余慶之不終兮當中路而廢之彼有初而鮮克兮賢者其猶不欺况陶鈞之匠物胡不貞而諒之豈其始終爽德蒼黃變色無心意乎簪履有悲哀乎楊墨巳焉哉天蓋高兮不可問地蓋廣兮不容人鐘鼓玉帛兮非吾事池臺花鳥兮非我春寂兮寞嵗嵗年年長少樂慌兮惚朝朝暮暮生白髮愴恍懭恨兮無所見宛轉聫踡兮獨向隅狀若重狴圓扉之受絏又似乾池涸井之相濡鸞鳯之翮已鎩兮徒奮迅於籠檻騏驥之足已蹇兮空悵望於廷衢龍門之桐半死鄧林之木全枯苟含情而稟氣兮孰能不傷心而疾首乎歌曰嵗將晏兮歡不再時已晚兮憂來多東郊絶此麒麟筆西山祕此鳳凰柯死去死去今如此生兮生兮奈汝何悲夫悲夫事有不可得而已矣是以古之聽天命者飲淚含聲而就死推不言兮焚于介山地不偶兮跂于嶷水仰天而嘆員憤骨於吳江下淚交頥卿悲歌於燕市天無雷兮聞蟻聚於床下家非牧兮見牂生於奧裏支離疏之五官已敗哀駘駝之六骸不美求時夜兮求梟炙何逼迫之如此為鼠肝兮為蟲臂何煆錬之如彼鬱拂沕滑兮中瞀亂蟠薄煩寃兮長憤惋出户庭兮遊息千萬里兮無極杳兮靄川綿曠兮水如帶㟹兮籟山崴螺兮雲似蓋萋兮緑春草生兮長河曲試一望兮心斷續晚兮晼夕鳥沒兮平郊逺試一望兮魂不返蘼蕪葉兮紫蘭香欲往從之川無梁日云暮兮涕沾裳松有蘿兮桂有枝有美一人兮君不知氣欲絶而何為孟夏兮恢台楊柳散兮芙蓉開葉初成兮蠶宛轉花落盡兮燕徘徊望夫君兮不來形枯稿兮意摧頽天何為兮愁苦麥將秀兮多風梅將黃兮屢雨日色旰爛兮流金而爍石地氣燠煜兮滿室而充户神翳翳兮似灰命綿綿兮若縷一伸一屈兮比艱難乎尺蠖九生九死兮同變化乎盤古萬物繁茂兮此時余獨何為兮腸邅回而屢腐圍棋廢兮時不可乎再來鳴琴停兮人何時以重撫秋風起兮野蒼蒼兼葭變兮露為霜蟬悲翳兮聲斷鴈迷雲兮路長摧折蕭條兮林寡色憔悴藝黃兮草不芳停劒兮懷舊友天外兮思故鄉願一見兮終不得側身長望兮淚浪浪遙兮逺山谷縈回兮屢轉狀若登薊門兮望胡苑斷兮連井邑丘墟兮知幾年又似登隴首兮見秦川木葉落兮長年悲紅顔謝兮鬢如絲王孫來兮何遲遲思公子兮涕漣洏風嫋嫋兮雨凄凄螢火飛兮烏夜啼牽牛西北兮星巳轉織女縱橫兮河欲低秋夜迢迢兮秋未極愁人耿耿兮愁不息有所思兮在天漢欲往從之兮無羽翼鬱金栧兮木蘭舟青莎裳兮白羽裘戲緑波兮坐芳洲歡不停兮人不留悵容與兮徒離憂玄冬慘兮隂氣凝沸泉結兮炎州冰郊野昏兮寒沙漲河海暗兮繁雲興嚴風急兮密雪下墐户閉兮無留者盻城郭兮瓊為樹兮玉為樓瞻通路兮駕素車兮乘白馬時眇眇兮嵗冥冥晝杳杳兮夜丁丁庭有霜兮月華白室有人兮燈影青披重衾兮魂悄悄臥空床兮目熒熒御燻罏兮長不暖􅍟巵酒兮憂恆滿悲繚繞兮從中來愁纒綿兮何時斷重曰四時兮代謝萬物兮遷化聽春鳥於春朝聞秋蟲於秋夜花覆地兮無待河傾天兮不借無靈草兮駐朽質乎千年無雕戈兮回踆烏乎三舍夏日長兮繩繩炎風暑雨兮相蒸草木扶疏兮如此余獨蘭驒兮不自勝玄月兮祈寒窮急景兮摧殘霰雪氛氛兮長委積人事寥寥兮悵漫漫春秋冬夏兮四序寒暑榮悴兮萬端春也萬物熙熙焉感其生而悼死夏也百草榛榛焉見其盛而知其闌秋也嚴霜降兮殷憂者為之不樂冬也陰氣積兮愁顏者為之解歡聖人知性情之紛紏故嘆之曰余欲無言吾將焉往而適耳箕有峰兮頴有瀾歌曰嵗去憂來兮東流水地久天長兮人共死明鏡羞窺兮向十年駿馬停驅兮幾千里麟兮鳳兮自古吞恨無已命曰命曰昊天不傭兮降此鞠凶昊天不惠兮降此大戾不先不後兮為瘥為瘵痛之撫兮孰知其厲木之柔兮緡之絲之人之溫兮黼之藻之自天佑之兮無不利一者之來兮云何二野有鹿兮其角兟兟林有烏兮其羽習習余獨何為兮悲攢欒兮憂戢孴南山巃嵸兮樹輪囷北津清泚兮石嶙嶙天之生我兮胡寧不辰少克已而復禮無終食兮違仁既好之以正直兮諒無負於神明何彼天之不吊兮哀此命之長勤百罹兮六極橫集兮我身長攣圈以偃蹇永伊鬱以呻嚬天道何從自古多卭為臧兮匪祐匪仁兮覆庸蹻狼戾兮南泛跖叛渙兮東風並強大兮熏赫咸夀考以從容勛則天兮朱已矣韶盡美矣均忽焉公矦之系兮必復堯舜之後兮何愆干執諫兮辛載蕃抗議兮靈年忠與貞兮何仇俱不得其死焉牛一變而為虎鱉三化而作鵑觸民居蝸而爭地龍伯釣鼇而訴天何變化之殊族而大小之相懸長無述焉將不死而為賊賢哉回也今不幸而蚤亡明夷何辜兮羑里洪範何恃兮佯狂我視於天兮亦孔之癢丘與溺兮殊貫單與張兮相詭紛紜總總兮若兹羌未得其玄已盛之孝兮姚何感而遂開合之恭兮昆何嫌兮不起聖人不議姬旦憤於鴟梟君子無憂周南歌於芣苡五鹿云折退守平陵之田三都已成歸入宜春之里乾不穆兮一為戍一為辰坤不恆兮三成田三成水何斯柱之危脆一夫觸之而云折東南眇其既傾西北豁其中裂有𣏌者國竟未掬其烏蟾有歷其都奄以成其魚鱉共何壯兮而損其盈媧何神歟而補其闕天且不能自固地且不能自持安得而有萬物安得而運四時彼山川與象緯其孰為之主司生也既無其主死也云其告誰何必拘拘而局局可浩然而順之吾知惡之不能為惡故去之曰群生之所蠧吾知善之不能為善故就之曰有生之大路雖粉骨而糜軀終不改乎此度重曰豫既昧此杳冥兮迷之不知其所屆將寄命於六師訪真訣乎遐外見流星以為旗邀白雲而為蓋玉虬紛其旖旎青鸞儼其容裔霓為裳兮羽為旗雷為車兮電為斾噂噂兮上馳遙遙兮橫厲忽若夢兮有覺與巫陽兮相會巫陽為豫兮挈龜龜告豫以雙支朱雀搖而金躍青龍發而火馳蛇登栖兮雞入冗雲北走兮水西垂巫陽曰反兮覆兆不告靈蔡誠不能知造化之心數朽骨焉足以定古今之倚伏請導列缺之前旌部豐隆之後轂披上帝之玄鍵考中皇之祕籙於是排雲旌兮呌諸闕登紫翠兮伏瑤壇靈烏果其將駕東皇釐其既觀余敷衽而未決兮東皇頷而不言玉女申之以瓊蘂靈妃貺之以琅玕悵容與而不駐肅雲軿於南軒窈窕徘徊邈矣悠哉下臨兮星雨上絶兮氛埃倣徨兮三清之館縹眇兮八風之臺俯觀兮故國洞崢嶸兮無極長懷兮故人涕潺湲兮霑軾橫天苑歷北辰經瑤樓兮一息停余車之轔轔涉明河之清淺過織女而問津巫陽曰左招搖兮右天駟太乙之車兮無不利其道也楓為天兮棗為地盍往從之兮導君意太乙方握髯低睂右手拄頥或以日臨命以嵗加時再轉兮再考三命兮三推華蓋微明兮君子居貞之位太陽陰主兮天人厄運之期若夫一氣鴻濛萬化緇釐此星精與木局又何足以知之巫陽曰太上有老君焉其名曰伯陽遊閬風之瓊圃處倒景之琳堂披拂日月咀嚼煙霜撫千載兮為朝為暮濟萬物兮若存若亡古之聰明博達而不死者將與君子造崑崙之大荒逮而容與弭節翺翔俄參元而下降濟弱水之湯湯瞵軒臺而右轉􅍟玉檻之鏘鏘伯陽欣然見余曰升之來何遲何故疲憊之如是何故枯稿之若兹吾適以爾小别今將千二百期昔者爾為翟吾固知爾潔潔焉無益其後爾為舟吾欲告爾休休焉不留名已登乎仙格爾身常蹇乎中州噫哉甚可痛甚可哭多智也命之斧斤多才也身之桎梏爾形骸之在地也每矍矍然求媒精魂之於天也又遑遑焉訪卜何異儀丹鳳於膠柱飼玄魚於森木何晚晤之逶迤何早計之觳觫嗚呼何異喪其親也揭竿而求諸海失其子也擊鼓而訪諸道途之逺矣曷其云蘇與影捕逐可不謂悲乎夫途之動也翂翂翐翐靜也若喪若失矘兮不以死生為二塊兮若以天地為一生於萬物之後不為緩死於太古之前不為疾弊萬類也不謂之凶利四海也不謂之吉夫如是則巨浸稽天而不溺鴻災冶地而不然生死不能為其夀夭變化適足寄其騰遷化而為魚也則躍龍門而橫碣石化而為鳥也則陪羊角而負青天為社也則長無斤斧之患為瓠也則泛乎泱漭之川物無可而不可何必守固以拳拳余於是乎嗒然而喪其偶倐爾而失其知思故池之淥水憶中園之桂枝栩栩然若有得茫茫然若有亡嘆倣佛兮覺悟魂已歸乎北鄉其往也人皆為之避席其返也鳥不為之亂行歌曰茨山有薇兮頴水有漪夷為柏兮秋有實叔為栁兮春雨飛倐爾而笑泛滄浪兮不歸
