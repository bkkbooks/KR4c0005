front:
  text: 幽憂子集巻之六
  hash: sha256:1b15771d8766d2b210d6a9a12f1c3f013ab6f99d59b55bb76f695f5c24bd2f54
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0005_SBCK_006-1a}
body:
  text: 唐范陽盧照隣昇之著明閩漳張爕紹和纂序駙馬都尉喬君集序昔文王既没道不在於兹乎尼父克生禮盡歸於是矣其後荀卿孟子服儒者之褒衣屈平宋玉弄詞人之柔翰禮樂之道已顛墜於斯文雅頌之風猶綿聯於季葉痛乎王澤既竭諸矦爲麋鹿之塲帝圖伊梗天下作豺狼之國秦人一滅舊章大愚黔首羣書赴火化崑岳之高煙儒士投坑變蓬萊之巨壑樂沈於海河間王初睠睠於古篇禮適諸夷叔孫通乃區區於綿蕝安國討論科斗五典叶從史遷祖述獲麟八書爰創衣冠禮樂重聞三代之風玉帛謳歌無墜六經之業鬱其興詠大雅於是為羣自此迄今年逾千祀聖門論賦相如為入室之雄闕里裁詩公幹即升堂之客陸平原龍驚學海浮天泉以安流鮑叅軍鶴翥文塲代黄金之平埒臨曲䑓之上路面通衢之小苑蓮紅水碧堪釣叟之淹留桂白山青宜王孫之攀折香車貴士不掩龍闗縫掖書生時通驛騎坐蘭徑敞松扉北牖動而清風來南軒幽而白雲起欣然命駕弔曲江之隑淵興盡而歸聆伊川之笙吹三朝慶謁趨劒履於南宫五日歸休聞歌鐘於北里雍容車騎屢動雕章嘯傲煙霞仍涵寳思奢不敗徳笑金谷之羅紈儉不邀名悲蘭陵之芻布榮期三樂君寔四之平子四愁我無一矣君教訓子弟不讀非聖之書撫愛家僮常恐名奴之辱婚嫁巳畢欲就金丹輪蓋非榮猶思道樹明霞曉挹終登不死之庭甘露秋團儻踐無生之崕凡所著述多以適意為宗雅愛清靈不以繁詞為貴足以傳諸好事貽厥孫謀故撰而存之凡為若干巻云爾南陽公集序昔者龍蹲東魯陳禮樂而救蒼生虎據西秦焚詩書以愚黔首通其變參天二地謂之神合其機一隂一陽謂之聖是以楚漢方鬬蕭曹絳灌負長劔於此時袁曹已平徐陳應劉弄柔翰於當代聖人方士之行亦各異時而並宜謳歌玉帛之書何必同條而共貫文質再而復殷周之損益足徵驪翰三而始虞夏之興亡可及美哉煥乎斯文之功大矣自獲麟絶筆一千三四百年游夏之門時有荀卿孟子屈宋之後直至賈誼相如兩班敘事得丘明之風骨二陸裁詩含公幹之奇偉鄴中新體共許音韻天成江左諸人咸好瓌姿豔發精博爽麗顔延之急病於江鮑之間疎散風流謝宣城緩步於向劉之上北方重濁獨盧黄門徃徃髙飛南國輕清惟庾中丞時時不墜嗟乎古今之士遞相毁譽至有操我戈矛啓其墨守三都既麗徵夏熟於上林九辯已髙責春歌於下里蹐駮之論紛然遂多近日劉勰文心鍾嶸詩評異議蜂起髙談不息人慙西氏空論拾翠之容質謝南金徒辯荆蓬之玅拔十得五雖曰肩隨聞一知二猶為臆說俞曰未可人稱屢中化魯成魚曷云其逺非夫玅諧鐘律體㑹風騷筆有餘研思無停趣作龜作鏡聽歌曲而知亡為龍為光觀禮容而識大齊魯一變之道唐虞百代之文懸日月於胷懐挫風雲於毫翰含今古之制扣宫徵之聲細則出入無間麤則彌綸區宇逶迤綽約如玉女之千嬌突兀崢嶸似靈龜之孤朴乘槎上漢誰問坳塘之淺深荷㦸入秦寧議長安之逺近是非未定曹子建皓首為期離合俱傷陸平叔終身流恨超然若此適可操刀自兹已降徒勞舉斧八病爰超沈隠侯永作拘囚四聲未分梁武帝長為聾俗後生莫曉更恨文律煩苛知音者稀常恐詞林交喪雅頌不作則後死者焉得而聞乎貞觀年中太宗外厭兵革垂衣裳於萬國舞干戚於兩階留思政塗内興文事虞李岑許之儔以文章進王魏來褚之輩以材術顯咸能起自布衣蔚爲卿相雍容侍從朝夕獻納我之得人於斯爲盛虞愽通萬句􅍟問不休李長於五言下筆無滯岑君論詰亹亹聽者忘疲許生章奏翩翩談之未易王侍中政事精宻明達舊章魏太師直氣鯁詞兼包古義禇河南風標特峻早鏘聲於冊府變風變雅立體不拘於一塗既博既精爲學遍遊於百氏自豸冠指佞雞樹登賢内掌機宻外脩國史晨趨有暇持綵筆於瑶軒夕拜多閑弄雕章於琴席含毫顧盻漢家之城闕風煙逸韻縱横秦地之林泉魚鳥黄山羽獵幾奏瓊篇汾水樓船參聞寳思南津弔啒去逐蒼梧之雲西路悲昻來挽葱巖之雪江湖廊廟造次不忒其儀沙塞朝廷顛沛必歸於漢是使名流俱至兎翰闐門愛客相尋雞談滿席嚶嚶好鳥花欲白兮桺将菲逰魚蓮將紅兮蘋可望綠樽恒湛齋閣臨霞綺札逾新園亭坐月凢所著述千有餘篇今之刋冩成三十卷早遊西鎬及周史之闕文晚卧東山憶漢庭之遺事平津矦之賓舘馬廏蕭條李司隸之仙舟龍門荒毁交交黄鳥集於栩兮集於桑營營蒼蠅止於藩兮止於棘九原可作松有隧兮兎有埏三湘不追川無梁兮鳥無徑輟斤之慟何獨荘周聞笛而悲寧惟向秀徒勤觀海未知渤瀚之倪永好談天莫究氤氲之數遂抽短翰為之序云樂府雜詩序聞夫歌以詠言庭堅有歌虞之曲頌以紀德奚斯有頌魯之篇四始六義存亾播矣八音九闋哀樂生焉是以叔譽聞詩驗同盟之成敗延陵聽樂知列國之典彜王澤竭而頌聲寝伯功衰而詩道缺秦皇滅學星琯千年漢武崇文市朝八變通儒作相徵博士於諸矦中使驅車訪遺編於四海發詔東觀縫掖成陰獻書南宫丹鉛踵武王風國詠共驪翰而升沈里頌途歌隨質文而沿革以少卿長别起髙唱於河梁平子多愁寄遙情於壠坂南浦動闗山之役作者悲離東京興黨錮之誅詞人哀怨其後鼓吹樂府新聲起於鄴中山水風雲逸韻生於江左言古興者多以西漢為宗議今文者或用東朝為美落梅芳樹共體千篇隴水巫山殊名一意亦猶負日于珍狐之下沈螢於燭龍之前辛勤逐影更似悲狂罕見鑿空曾未先覺潘陸顔謝蹈迷津而不歸任沈江劉來亂轍而彌逺其有發揮新題孤飛百代之前開鑿古人獨步九流之上自我作古粤在兹乎樂府者侍御史賈君之所作也君升堂入室踐龜字以長驅藏翼蓄鱗展龍圖以高視林宗一見許以王佐之才士季相看知有公卿之量南國蛟龍之燿下觸詞鋒東家科斗之書來游筆海朝陽弄翮即踐中京太行垂耳先鳴上路當赤縣之樞鑰作高䑓之羽儀動息無格於温仁顛沛安由乎正義玉堦覆奏謹依汲直之聞銅術埋輪先定雍門之罪霜䑓有暇文律動於京師繡服無私錦字飛於天下九成宫者天子之殊庭羣仙之一都也五城既逺得崑閬於神京三山已沈見蓬萊於古輔紫樓金閣雕石壁而鏤群峰碧甃銅池俯銀津而横衆壑離官地險丹磵四周徼道天廻翠屏千仞衛尉寝蒙茸之署將軍無刁斗之警中巖罷燠飛霜為之夏凝大谷生寒層淮以之秋沍天子萬乘驅鳳輦於西郊羣公百僚扈龍軒而北輔春秋絡繹冠蓋滿於青山寒暑推移旌節喧於黃首夕宿雞神之野朝登鳳女之䑓青鳥時飛白雲無極千年啓聖邈同汾水之陽七日期仙頗類緱山之曲經過者徒知其美揄揚者未歌其事恭聞首唱遂屬洛陽之才俯視前脩將麗長安之道平恩公當朝舊相一顧増榮親行翰墨之林光標唱和之雅於是懐文之士莫不嚮風靡然動麟閣之雕章發鴻都之寳思雲飛綺札代郡接於蒼梧泉湧華篇岷波連於碣石萬殊斯應千里不違同晨風之鴪北林似秋水之歸東壑洋洋盈耳豈徒懸魯之音郁郁文哉非復從周之說故可論諸典故被以笙鏞爰有中山郎徐令雅好著書時稱愽物探亡篇於古壁徵逸簡於道人撰而集之命余為序時褫巾三蜀歸臥一丘散髪書林狂歌學市雖江湖廊廟賓廡蕭條綺季留矦神交髣髴遂復驅偪幽憂之疾經緯朝廷之言凡一百一篇分為上下兩巻俾夫舞雩周道知小雅之歡娯撃壤堯年識太平之歌詠云爾宴梓州南亭詩序梓州城池亭者長史張公聽訟之别所也徒觀其巖嶂重複川流灌注雲窓綺閣負繡堞之逶迤澗户山樓帶金隍之繚繞信巴蜀之奇制也時鳯扆多閑上得和平之政鯷瀛有截下無交爭之人以公寄切上僚故久無州将連四千石之重任總十萬井之雄班職逾劇而道彌髙位逾崇而徳彌廣市獄無事時狎鳥於城隅邦國不空旦觀魚於濠上賓階月上横聨蜷之桂枝野院風歸動葳蕤之萱草則有明珠愛客置芳酒於十旬羽服神交契仙㳺於五日圓潭寫鏡光浮落日之津雜樹開帷彩綴飛煙之路藤蘿杳藹挂疎陰以送秋鳬鴈參差結流音而將夕百年之歡不再千里之㑹何常下客悽惶暫停歸轡髙人賞翫豈輟斯文咸請賦詩六韻成章云爾宴鳳泉石翁神祠詩序夫圯上黄公靈期巳逺湘中玄乙化跡難徵况乎神理巋然近帶青溪之路瓌資可望俯控丹巖之下予以歸骸空谷言隔市朝濯髪長川載罹寒暑心灰兩寂長無具爾之歡形木䨇枯将有終焉之志不悟喬鸎始囀喈喈於鶺鴒野蕚初開韡韡於棠棣命壺觴而引宴即沐新蘭尋磵戸以安歌仍攀野桂萋萋春草王孫游兮不歸秩秩斯干幽人去而忘返鼔我舞我修袖滿於中巖神之聽之多祐興於觸石爰有嘉命咸遣賦詩請題四韻列之如右七日綿州泛舟詩序諸公迹寓市朝心游江湖訪竒交於千里惜良辰於寸隂常恐辜負琴書荒涼山水於是脱屣人事鳴棹川隅言追挂犢之才用卜牽牛之賞邉生經笥送炎氣以濯纓郝氏書囊臨秋光而曝背似遇􅚆山之客還疑星漢之游願駐景於髙天想乗霓於縮地繁絲亂響涼酎時斟戲翔羽於平沙釣潛鱗於曲浦乗流則逝不覺忘歸咸可賦詩探韻成作楊明府過訪詩序夫清風動駕謁阮籍於山陽素雪乗舟訪戴逵於江路猶名髙好事迹標良史未有鶯臨綺月筵開許郭之談花聚繁星門枉荀陳之馭泛烟光於紫㶑翻露色於丹滋亭臯一望平蕪千里萋萋芳草童兒牧馬之塲亹亹晴川野老休牛之塔釣䑓隠隠先生之桑梓可知茨嶺巖巖隠士之風流尚在豈使臨卭樽酒歌賦無聲彭澤琴書田園寝詠􅍟問􅍟蜀父老問龍集荒落律紀蕤賓余自酆鎬歸於五津從王事也丁丑届於昇僊橋止送客亭即相如所謂不乘髙車駟馬不出汝下者也遇蜀父老皤然龎睂華髪者休於斯謂予曰子非衣冕之族歟文章之徒歟飾仁義以干時乎懐詩書以邀名乎吾聞諸夫子曰邦有道貧且賤焉耻也當今萬方日朗九有風靡主上垂衣裳正南面而已矣庸非有道乎而子爵不登上造位不至中涓藜羮不厭短褐不全庸非貧賤乎吾視子形容顦顇顔色疲怠心若涉六經眼若營四海何其無恥也何其不一干聖主効智出奇何栖栖黙黙自苦若斯吾聞克為卿失則烹何故區區冗冗無所成名余笑而應之曰井魚不可以語於海者拘於墟也夏蟲不可以語於氷者篤於時也盖聞智者不背時而徼幸明者不違道以干非是以聖賢馳騖莫救三家之徹匹夫髙抗不屈萬乘之威道在則簞瓢匪陋義存則珪組斯違或立談以邀鼎食或白首而甘布衣或委輅而仕屬論都之㑹或射鈎以相遇匡覇之機亦有朝爲伊周暮爲桀跖當其時也襲珩珮之鏘鏘失其時也委溝渠而喀喀故使龍丘先生羞聞擁篲鴈門太守不如縫掖孟軻偃蹇爲王者師范雎匍匐爲諸矦客富貴者君子之餘事仁義者賢達之常迹來不可違類鴻鴈之隨陽去不可畱同白駒之過隙行蘇張之辯於媧燧之年則迂矣用韓彭之術於堯舜之朝則舛矣守夷齊之節於湯武之時則孤矣抱申商之法於成康之日則愚矣彼一時也此一時也易時而䖏失其所矣大唐之有天下也出入三代五十餘載月竁來庭風丘欵塞華旌巳偃羽檄巳平雖有㢘白之將孫呉之兵百勝無遺策千里不畱行無所用也社首既禪介丘既封創明堂立辟雍雖有闕里之聖淹中之儒叔孫通之蕝公玉帶之圖將焉設也咸英並作韶武畢用奏之方澤而地祗登昇之圓丘而天神降雖有伶倫伯夔延陵子期操雅曲則風雲動激悽音則草木悲又何施也畵衣莫犯囹圄不修雖有咎繇仲甫之器釋之定國之儔金科在握丹筆如流非急務也人歸東户家沐南薰山澤無蹊隧雞犬不相聞雖有文翁黄覇之述職子游子賤之絃歌政成禮讓俗被雍和固無取也干戈已戢禮樂已興刑罰巳措梁父已昇公卿常伯庻政其凝雖有鴻才大略麗句藻一作豐詞發言盈乎百代濡翰周乎四時畧無益於今日而適足以怫之是故天子恭已羣臣演成攘袂而陵稷卨撫掌而笑阿衡無為而萬物皆遂不言而品彚咸亨莫不稱贊鴻烈揄揚頌聲言殊者招累行危者相傾効智者輟談於草澤出竒者褁足於山楹許由去而堯臣不少善巻迯而舜徳不輕夫周冕雖華猨㺅不之好也夏屋雖崇騏驥不之䖏也載鼷以車馬不如放之於藪穴也樂鷃以鐘鼔不如栖之以深林也此數物者豈惡榮而好辱哉蓋不失其天真也若余者十五而志於學四十而無聞焉詠羲農之化翫姬孔之篇周遊幾萬里馳騁數十年時復陵霞汎月搦札彈弦隨時上下與俗推遷門有張公之霧突無墨子之烟雖吾道之窮矣夫何妨乎浩然今將授子以中和之樂申子以封禪之篇終眇慙乎措地竊所慕於談天於是蜀父老再拜而謝曰鄙夫瞽陋長自愚惑習俗遐陬不遊上國聞王人之休音聽皇猷之允塞亦猶獻雉而遇司南衘龍而光有北請終餘論永告卭𤏡
