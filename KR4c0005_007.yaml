front:
  text: 幽憂子集卷之七
  hash: sha256:c36fbe4bc36e0ee89b30d43fe36f40e14750d506d8f7943a8d14c5c1cb57ea11
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0005_SBCK_007-1a}
body:
  text: 唐范陽盧照鄰升之著明閩漳張燮紹和纂書與在朝諸賢書昔張子房處太傅之尊自疏於南山隱公孫弘居丞相之位亦伏地於東方生伯喈已亡孔文舉將老兵而造膝方回尚在王羲之就倉奴而共談良史書之髙賢不以為纍自古朝野曷常以人廢言况下官抱疹東山不干時事借人唱和何損于朋黨延州子期聞音竊抃猶冀身膏丹壑脫寶劒於山阿骨掩黃塵罷瑤琴於天下捐金抵於山谷者非太平之美事乎幽憂子白與洛陽名流朝士乞藥直書幽憂子學道于東龍門山精舍布衣藜羮堅卧於一巖之曲客有過而哀之者青囊中出金花子丹方相遺之服之病愈視其方丹砂二斤穀楮子則山中可有丹砂則渺然難致昔在關西太白山下一隱士多玄明膏中有丹砂八兩豫時居貧不得好上砂但取馬牙顔色微光淨者充用自爾丁府君憂每一號哭涕泗中皆藥氣流出三四年羸臥苦嗽幾至于不免復偶於他方中見一說云丹砂之不精者服之令人多嗽訪知一處有此物甚佳兩必須錢二千文則三十二兩當取六十四千也空山臥疾家業先貧老母年尊兄弟祿薄若待家辦則委骨於巉嵓之峰矣意者欲以開嵗五月穀子熟時試合此藥非天下名流貴族王公卿士於仁惻之心達枯骨朽株者孰能濟之哉今力疾賦詩一篇遍呈當代博雅君子雖文不動俗事或傷心儻遇晏嬰脫左驂而見贖如逢孔子分秉粟以相憂則越石原憲不辛苦於當年矣唯當坐禪念室以答深仁若諸君子家有好妙砂能以見及最為第一無者各乞一二兩藥直是庶幾也仲尼曰有能一日用其力於仁者乎未有力不足者又曰君子無終食之間違仁在坐則參於前在輿則倚於衡古人心可見矣又曰仁逺乎哉我欲仁斯仁至矣言能苟行之仁道不逺也朝英貴士博濟而好仁者何必相識故知與不知咸送詩告請無案劔同掩體骸云爾寄裴舍人諸公遺衣藥直書山信至自都太子舍人裴瑾之太子舍人韋方賢左史范履冰水部員外郎獨孤思莊少府丞舍人內供奉閻知微符璽郎喬侃並有書問余疾兼致束帛之禮以供東山衣藥之費嗟乎代與道交喪其來尚矣殷揚州與外甥韓康伯别慨然而詠富貴他人合貧賤親戚離因泣下交頥不能自已余以其為人也名過其實然窮達之際則西狩獲麟所不能免斯亦古君子之大悲也自鄶而下曷足譏焉余家咸亨中良賤百口自丁家難私門弟妹凋喪七八年間貨用都盡余不幸遇斯疾母兄哀憐破産以供醫藥屬多穀不登家道屢困兄弟薄遊近縣創巨未平雖每分多見憂然亦莫能取給海內相識亦時致湯藥恩亦多矣晚更篤信佛法於山下間營建所費尤廣本欲息貪寡欲緣此更使貪心萌生每得一物輒歡喜更恨不足嗚呼道惡在而奔競之若兹雖觀苦空無常而此業已就不可中廢祈獲福澤思與士君子共之贊相樂夫人檀龕讚相樂夫人韋氏者益州都督長史胡公之繼親也夫人寓跡蘭閨栖情香岫琢磨六行與三明而並驅馳騖四禪將十訓而齊駕粵以乾封紀嵗流火司辰敬造靈龕奉圖真相青蓮皓月爭華蚊睫之端寶樹天倡競爽鴻毛之際納須彌於纖芥嘗謂徒言置由旬於方丈今過其實重宣此義敢為讚云猗歟實相顯允神工規模鹿苑圖寫龍宫分身諦聽列坐談空羣天颯纚衆寶玲瓏雕窗引月鏤網搖風一窺妙境髙謝塵蒙益州長史胡樹禮為亡女造畫讚夫鎔金逞妙徒罄中人之産架寶崇奢未階大乘之化豈若圓徽紈素卷舒方丈之筵表裏丹青藻繪多林之色獨為先覺其在兹乎益州長史公道洽中孚履黃裳以貞吉寄隆分陜苴白茅而涉川猶為龜組相輝不離泡幻之域熊車結轍尚迷苦愛之津爰捨淨財幸求多福為亡女宇文氏敬造像等徵竒綃於水府採妙色於霞莊月面澄華疑金雲之夜敞蓮毫吐照狀珠浦之晨開花寶參差眺鶴林其非逺仙雲盻蠁登鷲巖其可望窮形盡相陋燕壁之含丹寫妙分容嗤吳屏之墜筆式揚顯福俾讚幽魂其詞曰正教東漸遺像西至化格三天功超十地偉歟大士弘慈逺致追慟幽途載營檀施皎潔霜紈照影丹素果發金口蓮生玉步地寶天花星羅雲布慧炬長設迷津永渡碑益州至真觀主黎君碑若夫三清上列瑤關控日月之圖八洞深居貝闕吐山河之鎮雖復扶桑大帝傳赤字於東華安寶神君受青符於南極猶未能發揮不宰復歸無物之功開鑿妙門言謝有為之業其馮馮翼翼百姓存焉而不知杳杳冥冥萬族死之而無愠獨為衆好之宗者其唯元始天尊乎暨乎蹩蹩為仁跂跋為義鴻臚傳小儒之具緘縢為大盜之術堯禹生而天下火馳姬孔出而群方鼎沸則有氤氲祖帝發皓鬢於東周兆朕皇輿飛紫雲於西道鳳交開景返徐甲之營魂龍光照天杜宣尼之神氣得一吹萬有大造於蒼生把十蹈五樹靈基於寶祚能使始皇東指見赤舄而長懷漢帝北遊望青烟而下拜於是靈山水府俱為鍊玉之場甲第離宫多入空歌之地青牛道士按錦節於中都白鹿仙人列瑤壇於八表乃劒門西拒卭關南望星橋􅍟斗像牛漢之秋橫月硤縈城疑兔輪之曉落武騎遷升之路冠蓋雲飛文翁講肄之堂英靈霧聚巖開􅌲桂藴金碧之祥光澗吐夭桃積神仙之粹氣至真觀者隋開皇二年之所立也尋屬煬帝驕淫蜀王奢僭冕旒多事有慙七聖之遊几杖不朝未遑八仙之術紫臺初構霜露霑衣碧洞新開蓬萊變海仙居制度與雲雷而共屯象帝威儀將市朝而猶梗皇家纂戎牝谷乘大道而驅除盤根瀨鄉擁真人之閥閲髙祖以汾陽如雪當金闕之上仙太宗以峒山順風屬瑤京之下視武皇帝凝旒紫閣懸鏡丹臺運璇極而正乾坤坐闓陽而調風雨變銅渾於九洛鱗羽登歌鳴玉鑾於四清烟霞變色焚符破璽更聞繩燧之初剖斗折衡重覩人倫之制銀書紀岱登日觀以論功玉牒封梁下雲丘而挍美千齡胎化申以駕羽之期萬嵗巖耆獻以華封之夀耕田鑿井者不知自然鼓腹擊壤者不知帝力嗚呼豈非道風幽贊之效與乃回輿詔蹕親幸譙若奉策老君為太上皇帝仍令天下諸州各置觀一所於是碧樓三襲上接虹霓絳闕九成下交星雨乘雲御氣日夕於關山薦璧投金嵗時於嶽瀆此觀地當樞要任切㑹昌南鄰覆錦之城西逼吞珠之界使星連注皇華結轍既而緑地榛蕪朱宫板蕩非夫位膺金䇿名載瓊軒為紫帝之羣賓列黃庭之上格孰能居此棟梁平圃丹雘長樓大開流電之庭廣制明霞之宇觀主三洞法師姓黎諱某廣漢雒人也金天命秩即有天地之官火正分司實掌羲和之任夏殷之際代為伯相或食邑於魯或書社於衛故魯之黎城衛之黎陽即其地也魏晉之交或立功於吳剖符於蜀在吳者其後封於夀春黎將故城有黎氏之墓石文石闕之字在焉在蜀符堅時秦為蜀郡太守北齊時練山為益州刺史故子孫因家於蜀法師練山之六代孫也祖宗父泉並為州郡都主簿平正七職之任蜀文公之好智固讓朝恩秦子整之多才終從郡辟禮儀體制鄉挍取式於公曹獄訟章程府主責成於平正時無留事復聞坐嘯之談野有讓耕重聽行歌之樂玄珠結慶剖江漢之圓流紫胞貽祉動岷精之垂曜豫章七嵗非復常材朝陽五色豈云凡鳥初登小學笑孔墨之神勞一見玄書以彭𣆀為已任玉笈雲􅌩之術龍緘鳳藴之圖莫不吞楚夢於胸中指魯城於掌上臨長水而飲犢不就堯徵卧巨澤而牧羊徒勞漢使冥丘聳駕左肘符觀化之辰諄壑停裝橫目傳栖真之地貞觀之末有昭慶大法師魁岸堂堂威儀肅肅裂圓冠而焚俗制橫大帳而抗山谷聲若坻頽辨均濤發仲尼河目飛電驚人子貢斗脣連環動坐昂昂不雜如獨鶴之映羣雞矯矯無雙狀真龍之􅍟芻狗于時三蜀耆老咸相謂曰興大道者其在兹乎初襲羽裙且蒞貞陽小觀才麾玉柄已馳天下大名尋而廣漢士人固請法師為靈集觀主去長桑之故苑臨隱弅之新丘經之營之既雕既琢銀臺中天而孤出珠樹匝地而叢生同赤城之建標有黃房之貞構觀中先有天尊真人石像大小萬餘區年代寢深儀範凋缺沈沈寶座積萬古之塵埃邈邈瓊顔被千齡之苔蘚法師睹斯而流涕曰不圖先聖尊容零落至此乃重肱即路無胈永哀櫛沐幾於四時栖遑周於百舍誓將崇輯事畢然後寢食為期鄉曲爭持錢帛競施珍寶費餘巨萬役不崇朝還開紫翠之容更表圓明之色行益州刺史駙馬都尉喬君主壻懿親勳門盛族任髙方面寄切西南法師道叶半千神凝正一而至真福地荒凉日久不有上德其誰振之又表請師為至真觀主法師升堂慷慨吐納玄科攝齊寥亮分明紫訣詞峯雲鬱觸劍石以飛揚義壑泉奔橫玉輪而浩蕩入其門者披烟霧於九天聞其音者聽咸韶於三月由是户外之履魚貫江水堂下之賓鴈行關塞黃老之學復於今矣則有王孫之黨都公之倫名亞春陵氣髙韓魏鸘裘玉劍散圓庭以陸離驥子銀鞍委山衢而沛艾法師以兹衆施即於天宫後起大講堂并造長廊二十餘丈琳堂鬱其峙起星闈忽以環周仰􅌄窱以嶙峋下崢嶸以廣朗陰娥假道窺玉女於南軒陽烏回轡照青禽於北閣又於觀內鑄銅鐘一口重七十斤立石壇三級周回一百步懸黍璣於碧落明月流光建瓊乳於玄都飛霜蓄韻壇開錦砌類江浦之澄霞庭列瑤階疑崑丘之積雪每至三辰法㑹八景真遊霓裳蕩耀魄之華羽蓋轉風雲之路通天亘景兼造化之全模帶鳥銜虹連飛動之竒勢可謂德光而功濟道勝而名揚者也前長史范陽公一代羽儀門傾四海前長史譙國公兩朝肺腑威動百城並屈銀黃俱伸玄素法師雍容坐鎮嘯傲行藏雖郭先生之禮峻晉矦蒙莊子之身輕梁相不能尚也若夫言出於口龍驥所不能追行成於心王公所不能及悲懷狥物風雨晦而逾勤苦節橫秋氷霜急而逾固尸居環堵而嵗計有餘道周稊稗而日用無竭又於學射靈山别立仙居一所即至真之珠庭也栽松蒔柏與月樹而交輪刻角雕甍共星樓而接翼蒼郊却倚猶太行之北登錦肆前通似灞陵之南望華表千年之鶴未見成都津亭八月之龍時歸鄉里法師出家入道三十餘年弟子所得襯施不可稱量盡入修營咸供衆用見諸疾苦便開五色之􅌩遇彼饑寒輒有千金之費巾拂之外餘無所留凡所經過洪濟多矣法師又於咸亨二年正月十八日寢疾之際聞空中有聲曰天上今欲相煩為玉京觀主法師辭以至真功德未就固請不行少選之間所疾便愈左右侍者無不同聞自是逺近道俗咸共驚嗟曰天上知余不肖將棄余矣上座監齊某等並流回左映策地景於丹田浩氣中升養天倪於紫室雖復同班玉籍並列仙宫每屈宗師之道仍修弟子之敬亦猶披衣齧缺同德而相尊雲將鴻濛比肩而相下大弟子並仙庭十哲道家童師閉門錬火陪嘯父之髙烟卜肆驅筠記壺公之逺御咸用輯瓊臺之墜典正騫樹之頽風散在人間敷揚道教可謂庚桑畏壘致大壤以匡時范相鴟夷行計然而濟俗僉曰吾師也䪡萬物而不以為義利萬代而不以為仁逍遙乎有無之表倣徨乎塵垢之外東郭順子無擇存而不論伯昏瞀人禦冦論而不議豈使為山九仞道不列於珠庭築館三休功未書於瑶版下官迷方看博邀赤斧於禺山失路乘槎問君平於蜀郡汾陽處子目擊而言忘漢陰丈人德全而機謝是用搜竒井絡題片石於靈丘觀藝協晨見乘雲之飛將蒼蒼中野同銷地媪之魂耿耿太初獨昧天師之化其詞曰象帝之先其誰之子徒觀其妙莫究其始果而勿代為而不恃强為之名謂之道紀一其太朴云季孝慈已彰邈邈帝祖繩繩帝鄉曰神曰聖為龍為光千年受籙萬古稱王二其於鑠帝唐丕承天秩道風吹萬玄猷配一五載乘雲三山禮日薦璧延士投金訪術三其地分輿井城連劒闕錦瀨開霞嵋峰吐月白雲舒卷青山回沒􅌲閣香飛桃源花發四其紫宸髙映丹宫洞開巖舒金碧地起樓臺鶴飛龍度鸞歌鳳回星雨交接風烟去來五其寶龜涵影玉顔乃眷神劒九光華冠萬變日軒朝敞雲歌夕轉紫樹瓊鐘玄壇竹院六其偉與上士昭哉至人笙簧道德粉澤人倫汾陽處子箕山外臣遂荒白屋奄有玄津七其玉扃將墜金階無主草滋紅壁苔凝繡柱式佇賢才崇其彠矩福庭霞煥仙徒霧聚八其縹眇四真雍容十哲俱升紫宇並邀清節松子排煙焦君卧雪辨雲懸㝢神遊朗徹九其玉壘庭坤珠鄉勝踐鐘鼎紛藹江山悠緬薛縣池平萊州水淺懸日月於鼇極播天人於鳳椽十其
