body:
  text: 附録盧照鄰小傳晉劉昫盧照鄰字升之幽州范陽人也年十餘嵗就曹憲王義方授蒼雅及經史博學善屬文初授鄧王府典籤王甚愛重之曾謂群官曰此即寡人相如也後拜新都尉因染風疾去官處太白山中以服餌為事後疾轉篤徙居陽翟之具茨山著釋疾文五悲等誦頗有騷人之風甚為文士所重照鄰既沈痼攣廢不堪其苦嘗與親屬執别遂自投頴水而死時年四十文集二十卷兄光乘亦知名長壽中為隴州剌史盧照鄰小傳宋宋祁照鄰字升之范陽人十嵗從曹憲王義方授蒼雅調鄧王府典籤王愛重謂人曰此吾之相如調新都尉病去官居太白山得方士玄明膏餌之會父喪號嘔丹輒出由是疾益甚客東龍門山布衣藜羹裴瑾之韋方質范履冰等時時供衣藥疾甚足攣一手又廢乃去具茨山下買園數十𤱔疏潁水周舍復豫為墓偃臥其中照鄰自以當高宗時尚吏巳獨儒武后尚法巳獨黃老后封嵩山屢聘賢士巳巳廢著五悲文以自明病既久與親屬訣自沈賴水濱豔情代郭氏答盧照鄰唐駱賔王迢迢芊路望芝田眇眇函關限蜀川歸雲巳落涪江外還鴈應過洛水瀍洛水傍連帝城側帝宅層甍垂鳯翼銅駝路上柳千條金谷園中花幾色柳葉園花處處新洛陽桃李應芳春妾向雙流窺石鏡君住三川守玉人此時離别那堪道此日空牀􅍟芳沼芳沼徒遊比目魚幽徑還生拔心草流風回雪儻便娟驥子魚文實可憐擲果河陽君有分貨酒成都妾亦然莫言貧賤無人重莫言富貴應須種緑珠猶得石崇憐飛燕曾經漢皇寵良人何處醉縱橫直如循默守空名倒提新縑成慊慊翻將故劒作平平離前吉夢成蘭兆别後啼㾗上竹生别日分明相約束巳取宜家成誡朂當時擬弄掌中珠豈調先摧庭際玉悲鳴五里無人問腸斷三聲誰為續思君欲上望夫臺端居懶聽將雛曲沈沈落日向山低簷前歸燕並頭栖抱膝當窗看夕兔側耳空房聽曉雞舞蝶臨階秪自舞啼鳥逢人亦助啼獨坐傷孤枕春來悲更甚峨眉山上月如眉濯錦江中霞似錦錦字回文欲贈君劍壁層峰自糾紛平江渺渺分淸浦長路悠悠間白雲也知京洛多佳麗也知山岫遙虧蔽無那短封即疏索不在長情守期契傳聞織女􅍟牽牛相望重河隔淺流誰分迢迢經兩嵗誰能脈脈待三秋情知唾并終無理情知覆水也難收不復下山能借問更向盧家字莫愁遺事孟詵盧照鄰等師孫思邈照鄰有惡疾不可為感而問曰高醫愈疾奈何答曰天有四時五行寒暑迭居和為雨怒為風凝為雪霜張為虹電天常數也人之四支五藏一覺一寐吐納往來流為榮衛章為氣色發為音聲人常數也陽用其形陰用其精天人所同也失則蒸生熱否生寒結為瘤贅陷為癰疽奔則喘乏竭則燋槁發乎靣動乎形天地亦然五緯縮贏孛彗飛流其危診也寒暑不時其蒸否也石立土踊是其瘤贅山崩土陷是其癰疽奔風暴雨其喘乏川瀆竭涸其燋槁高醫道以藥石救以䍇劑聖人和以至德輔以人事故體有可愈之疾天有可振之灾照鄰曰人事奈何曰心為之君君尚恭故欲小詩曰如臨深淵如履薄冰小之謂也膽為之將以果决為務故欲大詩曰赴赴武夫公矦干城大之謂也仁者靜地之象故欲方傳曰不為利回不為義疚方之謂也智者動天之象故欲圓易曰見幾而作不俟終日圓之謂也復問養性之要答曰天有盈虛人有屯危不自愼不能濟故養性必先知自愼也愼以畏為本太上畏道其次畏天其次畏物其次畏人其次畏身憂於身者不拘於人畏於巳者不制於彼愼於小者不懼於大戒於近者不侮於遠知此則人事畢矣邈傳孫思盧照鄰弱冠拜鄧王府典籤王府書記一以委之王有書十二車照鄰總披覽略能記憶後為益州新都縣尉秩滿婆娑蜀中放曠詩酒故世稱王楊盧駱時楊之為文好以古人姓名連用如張平子之略談陸士衡之所記潘安仁宜其陋矣仲長統何足知之號為點鬼簿駱賔王文好以數􅍟如秦地重關一百二漢家離官三十六時人號為算博士如盧生之文時人莫能評其得失矣惜哉不幸有冉耕之疾著幽憂子以釋憤焉文集二十卷僉載朝野
