  - {type: variant, offset: 285, length: 1, content: 𤱔, SBCK: 􅅕}
  - {type: variant, offset: 285, length: 3, content: 𤱔疏潁, WYG: 訓而齊駕粤以乾封紀嵗流火司辰敬造靈龕奉圖真相青蓮皓月爭華蚊睫之端寳樹天倡競爽鴻毛之際納須彌於纖介嘗謂徒言置由旬於方丈今過其實重宣此義敢為讚云猗歟實相顯允神工規模鹿苑圖寫龍宫分身諦聴列坐談空羣天䬃纚衆寳玲瓏雕牕引月鏤網搖風一窺妙境髙謝塵蒙益州長史胡樹禮為亡女造畫讚夫鎔金逞妙徒罄中人之産架寳崇奢未階大乘之化豈若圓徽紈素巻舒方丈之筵表裏丹青藻繪多林之色獨為先覺其在兹乎益州長史公道洽中孚履黄裳以貞吉寄隆分陜苴白茒而陟川猶為龜組相輝不離泡幻之域熊車結轍尚迷苦愛之津爰捨淨財幸求多福為亡女宇文氏敬造像等徵竒綃于}
  - {type: page-break, offset: 285, content: '', id: KR4c0005_WYG_007-5a, image: WYG1065/WYG1065-0335c.png}
  - {type: variant, offset: 289, length: 0, content: '', WYG: 府採妙色于霞莊月面澄華疑金雲之夜敞蓮毫吐照狀珠浦之晨開花寳參差眺鶴林其非逺仙雲肸蠁登鷲巖其可望窮形盡相陋燕璧之含丹寫妙分容嗤吳屏之墜筆式揚顯福俾讚幽魂其詞曰正教東漸遺像西至化格三天功超十地偉歟大士𢎞慈逺致追慟幽途載營檀施皎潔霜紈照影丹素果發金口蓮生玉步地寳天花星羅雲布慧炬長設迷津永渡碑益州至真觀主黎君碑若夫三清上列瑤闗控日月之圖八洞深居貝闕吐山河之鎮雖復扶桑大帝傳赤字於東華安寳神君受青符於南極猶未能發揮真宰復歸無物之功開鑿妙門言謝有為之業其馮馮翼翼百姓存焉而不知杳杳冥冥萬族死之而無愠獨為衆好之宗者其唯元始太尊乎暨乎蹩躠為仁踶跂為義鴻臚傳小儒之具緘縢為大盜之術堯禹生而天下火馳姬孔出而羣方鼎沸則有氤氲祖帝發皓鬢於東}
  - {type: page-break, offset: 289, content: '', id: KR4c0005_WYG_007-5b, image: WYG1065/WYG1065-0335d.png}
  - {type: page-break, offset: 289, content: '', id: KR4c0005_WYG_007-6a, image: WYG1065/WYG1065-0336a.png}
  - {type: variant, offset: 290, length: 1, content: 舎, WYG: 兆朕皇輿飛紫雲於西道鳳交開景返徐甲之營魂龍光照天杜宣尼之神氣得一吹萬有大造於蒼生把十蹈五樹靈基於寳祚能使始皇東指見赤舄而長懐漢帝北遊望青煙而下拜於是靈山水府俱為煉玉之場甲第離宫多入空歌之地青牛道士按錦節於中都白鹿仙人列瑤壇於八表乃劍門西拒卭闗南望星橋對斗像天漢之秋横月硤縈城疑兔輪之曉落武騎遷昇之路冠蓋雲飛文翁講肄之堂英靈霧聚巖開菌桂藴金碧之祥光磵吐夭桃積神仙之粹氣至真觀者隋開皇二年之所立也尋屬煬帝驕淫蜀王奢僭冕旒多事有慚七聖之遊几杖不朝未遑八仙之術紫臺初構霜露沾衣碧洞新開蓬萊變海仙居制度與雲雷而共屯象帝威儀將市朝而猶梗皇家纂戎牝谷乘大道而驅除盤根瀨鄉擁真人之閥閱髙祖以汾陽如雪當金闕之上仙太宗以峒山順風屬瑤京之下視武皇帝凝旒紫閣懸鏡丹臺運璇極而正乾坤坐闓陽而調風雨變銅渾於九洛鱗羽登歌鳴玉鑾於四清煙霞變色焚符破璽更聞繩燧之初剖斗折衡重覩人倫之制銀書紀岱登日觀以論功玉牒封梁下雲邱而挍美千齡胎化申以駕羽之期萬嵗巖耆獻以華封之夀畊田鑿井者安於自然鼓腹擊壤者不知帝力嗚呼豈非道風幽賛之效與乃迴輿詔蹕親幸譙苦奉策老君為太上皇帝仍令天下諸州各置觀一所於是碧樓三襲上接虹霓絳闕九成下交星雨乘雲御氣日夕于闕山薦璧投金嵗時于岳瀆此觀地當樞要任切㑹昌南鄰覆錦之城西逼吞珠之界使星連注皇華結轍既而綠地榛蕪朱宫板蕩非夫位膺金䇿名載瓊軒為紫帝之羣賓列黄庭之上格孰能居此棟梁平圃丹雘長樓大開流電之庭廣制明霞之宇觀主三洞法師姓黎諱某廣漢雒人也金天命秩即有天地之官火正分司實掌羲和之任夏殷之際代為伯相或食邑於魯或書社於衞故魯之黎城衞之黎陽即其地也魏晉之交或立功于呉剖符於蜀在吴者其後封于夀春黎將故城有黎氏之墓石文石闕之字在焉在蜀符堅時秦為蜀郡太守北齊時練山為益州刺史故子孫因家于蜀法師練山之六代孫也祖宗父泉並為州郡都主簿平正七職之任蜀文公之好智固讓朝恩秦子整之多才終從郡辟禮儀體制鄉校取式于公曹獄訟章程府主責成于平正時無留事}
