  - {type: variant, offset: 495, length: 3, content: 分貨酒, WYG: 餘道周稊稗而日用無竭又於學射靈山别立仙居一所即至真之珠庭也栽松蒔柏與月樹而交輪刻角雕甍共星樓而接翼蒼郊却倚猶太行之北登錦肆前通似灞陵之南望華表千年之鶴未見}
  - {type: variant, offset: 500, length: 1, content: 妾, WYG: 津亭八月之龍時歸鄉里法師出家入道三十餘年弟子所得䞋施不可稱量盡入修營咸供衆用見諸疾苦便開五色之囊遇彼飢寒輒有千金之費巾拂之外餘無所留凡所經過洪濟多矣法師又於咸亨二年正月十八日寢疾之際聞空中有聲曰天上今欲相煩為玉京觀主法師辭以至真功徳未就固請不行少選之間所疾便愈左右侍者無不同聞自是逺近道俗咸共驚嗟曰天上知余不肖將棄余矣上座監齋某等並流迴左映策地景於丹田浩氣中升養天倪於紫室雖復同班玉籍並列仙宫每屆宗師之道仍修弟子之敬}
