  - {type: variant, offset: 1020, length: 376, content: 疾天有可振之灾照隣曰人事奈何曰心爲之君君尚恭故欲小詩曰如臨深淵如履薄冰小之謂也膽爲之將以果决爲務故欲大詩曰赴赴武夫公矦干城大之謂也仁者靜地之象故欲方傳曰不爲利囘不爲義疚方之謂也智者動天之象故欲圓易曰見㡬而作不俟終日圓之謂也復問養性之要答曰天有盈虛人有屯危不自愼不能濟故養性必先知自愼也愼以畏爲本太上畏道其次畏天其次畏物其次畏人其次畏身憂於身者不拘於人畏於巳者不制於彼愼於小者不懼於大戒於近者不侮於遠知此則人事畢矣邈傳孫思盧照隣弱冠拜鄧王府典籤王府書記一以委之王有書十二車照隣總披覽略能記憶後爲益州新都縣尉秩滿婆娑蜀中放曠詩酒故世稱王楊盧駱時楊之爲文好以古人姓名連用如張平子之略談陸士衡之所記潘安仁宜其陋矣仲長統何足知之號爲點鬼簿駱賔王文好以數􅍟如秦地重關一百二漢家離官三十六時人號爲算博士如盧生之文時人莫能評其得失矣惜哉不幸有冉畊之疾著幽憂子以釋憤焉文, WYG: ''}
