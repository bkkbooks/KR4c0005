  - {type: variant, offset: 484, length: 3, content: 魚文實, WYG: 銀鞍委山衢而沛艾法師以兹衆施即於天宫後起大講堂并造長廊二十餘丈琳堂鬱其峙起星闈忽以環周仰􅌄窱以嶙峋下崢嶸以廣朗陰娥假道窺玉女於南軒陽烏迴轡炤青禽于北閣又於觀内鑄銅鐘一口重七十斤立石壇三級週迴一百步懸黍璣于碧落明月流光建瓊乳於𤣥都飛霜蓄韻壇開錦砌類江浦之澄霞庭列瑤階疑崑邱之積雪毎至三辰法㑹八景真遊霓裳蕩耀魄之華羽盖轉風雲之路通天亘景兼造化之全模帶鳥銜虹連飛動之竒勢}
