  - {type: variant, offset: 16, length: 0, content: '', WYG: 尊自疏於南山隠公孫𢎞居丞相之位亦伏地於東方生伯喈已亡孔文舉將老兵而造膝方回尚在王羲之就倉奴而共談良史書之髙賢不以為累自古朝野曷嘗以人廢言況下官抱疹東山不干時事借人唱和何損於朋黨延州子期聞音竊抃猶冀身膏丹壑脱寳劍於山阿骨掩黄塵罷瑤琴於天下捐金抵於山谷者非太平之美事乎}
