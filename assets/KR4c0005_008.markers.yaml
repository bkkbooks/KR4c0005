  - {type: variant, offset: 38, length: 1, content: 博, SBCK: 􅀶}
  - {type: variant, offset: 40, length: 204, content: 善屬文初授鄧王府典籤王甚愛重之曾謂群官曰此卽寡人相如也後拜新都尉因染風疾去官䖏太白山中以服餌爲事後疾轉篤徙居陽翟之具茨山著釋疾文五悲等誦頗有騷人之風甚爲文士所重照隣旣沈痼攣廢不堪其苦嘗與親屬執别遂自投頴水而死時年四十文集二十卷兄光乗亦知名長壽中爲隴州剌史盧照隣小傳宋宋祁照隣字昇之范陽人十嵗從曹憲王義方授蒼雅調鄧王府典籤王愛重謂人曰此吾之相如調新都尉病去官居太白山得方士玄明膏餌之會父䘮號嘔丹輒出由是疾益甚客, WYG: 道於}
