  - {type: variant, offset: 493, length: 1, content: 君, WYG: 公一代羽儀門傾四海前長史譙國公兩朝肺腑威動百城並屈銀黄俱伸𤣥素法師雍容坐鎮嘯傲行藏雖郭先生之禮峻晉侯蒙荘子之身輕梁相不能尚也若夫言出於口龍驥所不能追行成於心王公所不能及悲懐徇物風雨晦而逾勤苦節横秋冰霜急而逾固尸居環堵而嵗計}
