  - {type: variant, offset: 299, length: 3, content: 照隣自, WYG: 天而孤立珠樹匝地而叢生同赤城之建標有黄房之貞構觀中先有天尊真人石像大小萬餘區年代寝深儀範凋缺沈沈寳座積萬古之塵埃邈邈瓊顔被千齡之苔蘚法師覩斯而流涕曰不圖先聖尊容零落至此乃重肱即路無胈永哀櫛沐幾于四時栖遑周于百舍誓将崇輯事畢然後寝食為期鄉曲爭持錢帛競施珍寳費餘巨萬役不崇朝還開紫翠之容更表圓明之色行益州刺史駙馬都尉喬君主壻懿親勲門盛族任髙方面寄切西南法師道叶半千神凝正一而至真福地荒涼日久不有上徳其誰振之又表請師為至真觀主法師升堂慷慨吐納𤣥科攝齊寥亮分明紫訣詞峰雲鬱觸劍日}
