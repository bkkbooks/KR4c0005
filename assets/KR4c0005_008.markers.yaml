  - {type: variant, offset: 293, length: 4, content: 爲墓偃臥, WYG: 章七嵗非復常材朝陽五色豈云凡鳥初登小學笑孔墨之徒勞一見𤣥書以彭耼為已任玉笈雲囊之術龍緘鳳藴之圖莫不吞楚夢于胸中指魯城于掌上臨長水而飲犢不就堯徵卧巨澤而牧羊徒勞漢使㝠邱聳駕左肘符觀化之辰諄壑停装横目傳栖真之地貞觀之末有昭慶大法師魁㟁堂堂威儀肅肅裂圓冠而焚俗制横大帳而抗山谷聲若坻頽辨均濤發仲尼河目飛電驚人子貢斗唇連環動坐昂昂不雜如獨鶴之映羣雞矯矯無雙狀真龍之對芻狗於是三蜀耆老咸相謂曰興大道者}
