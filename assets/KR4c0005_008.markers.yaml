  - {type: line-break, offset: 265, content: '', id: KR4c0005_SBCK_008-2a07}
  - {type: variant, offset: 265, length: 0, content: '', WYG: 奉閻知微符璽郎喬偘並有書問余疾兼致束帛之禮以供東山}
  - {type: variant, offset: 267, length: 0, content: '', WYG: 之費嗟乎代與道交喪其來尚矣殷揚州與外甥韓康伯别慨然而詠富貴他人合貧賤親戚離因泣下交頥不能自已余以為其人也名過其實然窮達之際則西狩獲麟所不能免斯亦古君子之大悲也自鄶而下曷足譏焉余家咸亨中良賤百口自丁家難私門弟妹凋喪七八年間貨用都盡余不幸遇斯}
  - {type: page-break, offset: 267, content: '', id: KR4c0005_WYG_007-3b, image: WYG1065/WYG1065-0334d.png}
  - {type: variant, offset: 268, length: 11, content: 甚足攣一手又廢乃去具茨, WYG: 母兄哀憐破産以供醫藥屬多榖不登家道屢困兄弟薄遊近縣創巨未平雖每分多見憂然亦莫能取給海内相識亦時致湯藥恩亦多矣晚更篤信佛法於}
  - {type: variant, offset: 281, length: 3, content: 買園數, WYG: 間營建所費尤廣本欲息貪寡欲縁此更使貪心萌生每得一物輒歡喜更恨不足嗚呼道惡在而奔競之若斯雖觀苦空無常而此業已就不可中廢祈獲福澤思與士君子共之贊相樂夫人檀龕讚相樂夫人韋氏者益州都督長史胡公之繼親也夫人寓跡蘭閨栖情香岫琢磨六行與三明而並驅馳騖四禪將}
  - {type: page-break, offset: 281, content: '', id: KR4c0005_WYG_007-4a, image: WYG1065/WYG1065-0335a.png}
