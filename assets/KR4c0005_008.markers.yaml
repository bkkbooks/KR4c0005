  - {type: variant, offset: 251, length: 1, content: 羹, WYG: 羮堅卧於一巖之曲客有過而哀之者青囊中出金花子丹方相遺服之病愈視其方丹砂二斤穀楮子則山中可有丹砂則𣺌然難致昔在闗西太白山下一隠士多𤣥明膏中有丹砂八兩予時居貧不得好上砂但取馬牙顔色微光淨者充用自爾丁府君憂每一號哭涕泗中皆藥氣流出三四年羸臥苦𠻳幾至於不免復偶于他方中見一說云丹砂之不精者服之令人多𠻳訪知一處有此物甚佳兩必須錢二千文則三十二兩當取六十四千也空山臥疾家業先貧老母年尊兄弟祿薄若待家辦則委骨於巉嵓之峰矣意者欲以開嵗五月穀子熟時試合此藥非天下名流貴族王公卿士於仁惻之心達枯骨朽株者孰能濟之哉今力疾賦詩一篇徧呈當代博雅君子雖文不動俗事或傷心倘遇晏嬰脱左驂而見贖如逢孔子分秉粟以相憂則越石原憲不辛苦于當年矣惟當坐禪忘室以答深仁若諸君子有好妙砂能以見及最為第一無者直乞一二兩藥直是庶幾也仲尼曰有能一日用其力於仁者乎未有力不足者又曰君子無終食之間違仁在坐則參於前在輿則倚於衡古人心可見矣又曰仁逺乎哉我欲仁斯仁至矣言茍能行之仁道不逺也朝英貴士博濟而好仁者何必相識故知與不知咸送詩告請無按劔同掩體骸云爾寄裴舍人諸公遺衣藥直書山信至自都太子舍人}
