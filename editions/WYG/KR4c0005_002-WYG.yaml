body:
  text: 七言古詩失羣鴈并序温縣明府以鴈詩垂示余以為古之郎官出宰百里今之墨綬入應千官事止鴈行未宜傷嘆至如羸卧空巖者乃可為失羣慟耳聊因伏枕多暇以斯文應之三秋北地雪皚皚萬里南翔渡海來欲隨石燕沈湘水試逐銅烏繞帝臺帝臺銀闕距金塘中間鵷鷺巳成行行過上苑傳書信暫下中州戲稻粱虞人負繳來相及齊客虚弓忽見傷毛翎頻頓一作憔悴飛無力羽翮摧頽君不識唯有莊周解愛鳴復道郊歌重竒色惆悵驚思悲未已徘徊自憐中㒺極傳聞有鳥集朝陽詎勝仙鳬邇帝鄉雲間海上應鳴舞逺得鵾絃猶獨撫金龜全寫中牟印玉鵠當變萊蕪釡願君弄影鳳凰池時憶籠中摧折羽行路難君不見長安城北渭橋邉枯木横槎臥古田昔日含紅復含紫常時留霧亦留煙春景春風花似雪香車玉輦恒闐咽若箇遊人一作童不競攀若箇娼家不來折娼家寳袜蛟龍帔公子銀鞍千萬騎黄鶯一一向花嬌青鳥雙雙将子戲千尺長條百尺枝月桂星榆相蔽虧珊瑚葉上鴛鴦鳥鳯凰巢裏雛鵷兒巢傾枝折鳳歸去條枯葉落任風吹一朝憔悴無人問萬古摧殘君詎知人生貴賤無終始倐忽須臾難久恃誰家能駐西山日誰家能堰東流水漢家陵樹滿秦川行來行去盡哀憐自昔公卿二千石咸擬榮華一萬年不見朱脣将白一作玉貌惟聞青棘與黄泉金貂有時便換酒玉麈恒搖莫計錢寄言坐客神仙署一生一死交情處蒼龍闕下君不留白鶴山頭我應去雲間海上邈難期赤心㑹合在何時但願堯年一百萬長作巢由也不辭長安古意長安大道連狹斜青牛白馬七香車玉輦縱横過主第金鞭絡繹向侯家龍銜寳盖承朝日鳳吐流蘇帶晚霞百丈遊絲爭繞樹一羣嬌鳥共啼花遊蜂戲蝶千門側碧樹銀臺萬種色複道交牕作合歡雙闕連甍垂鳳翼梁家畫閣天中起漢帝金莖雲外直樓前相望不相知陌上相逢詎相識借問吹簫向紫煙曽經學舞度芳年得成比目何辭死願作鴛鴦不羨仙比目鴛鴦真可羨雙去雙來君不見生憎帳額繡孤鸞好取門簾帖雙燕雙燕雙飛繞畫梁羅幃翠被鬱金香片片行雲着蟬鬢纖纖初月上鴉黄鴉黄粉白車中出含嬌含態情非一妖童寳馬鐵連錢娼婦盤龍金屈膝御史府中烏夜啼廷尉門前雀欲棲隠隠朱城臨玉道遙遙翠幰没金隄挾彈飛鷹杜陵北探九借客渭橋西俱邀俠客芙蓉劔共宿娼家桃李蹊娼家日暮紫羅裙清歌一囀口氛氲北堂夜夜人如月南陌朝朝騎似雲南陌北堂連北里五劇三條控三市弱栁青槐拂地垂佳氣紅塵暗天起漢代金吾千騎來翡翠屠蘇鸚鵡杯羅襦寳帶為君解燕歌趙舞為君開别有豪華稱將相轉日回天不相讓意氣由來排灌夫専權判不容蕭相専權意氣本豪雄青虬紫燕坐春一作生風自言歌舞長千載自謂驕奢凌五公節物風光不相待桑田碧海須臾改昔時金階白玉堂即今惟見青松在寂寂寥寥揚子居年年嵗嵗一􅇃書獨有南山桂花發飛來飛去襲人裾明月引洞庭波起兮鴻鴈翔風瑟瑟兮野蒼蒼浮雲捲靄明月流光荆南兮趙北碣石兮瀟湘澄清規于萬里照離思于千行横桂枝于西第繞菱花于北堂高樓思婦飛盖君王文姬絶域侍子他鄉見胡鞍之似練知漢劔之如霜試登髙而騁一作極望莫不變而迴腸懐仙引若有人兮山之曲駕青虯兮乗白鹿往從之遊願心足披磵户訪巖軒石瀨潺湲横石逕松蘿羃䍥掩松門下空濛而無鳥上巉巖而有猿懷飛閣度飛梁休余馬于幽谷掛余冠于夕陽曲復曲兮煙荘邃行復行兮天路長脩途杳其未半飛雨忽以茫茫山坱軋磴連褰攀石壁而無據泝泥溪而不前向無情之白日竊有恨於皇天迴行遵故道通川徧流潦迴首望羣峰白雲一作雪正溶溶珠為闕兮玉為樓青雲盖兮紫霜裘天長地久時相憶千齡萬代一來遊五言律詩劉生劉生氣不平抱劍欲専征報恩為豪侠死難在横行翠羽装劍一作刀鞘黄金鏤一作飾馬纓但令一顧重不恡百身輕隴頭水隴阪髙無極征人一望鄉闗河别去水沙塞㫁歸腸馬繫千年樹旌懸九月霜從來共嗚咽皆是為勤王巫山高巫山望不極望望下朝氛莫辨啼猿樹徒看神女雲驚濤亂水脈驟雨暗峯文霑裳即此地況復遠思君芳樹芳樹本多奇年華復在斯結翠成新幄開紅滿故枝風歸花厯亂日度影參差容色朝朝落思君君不知雨雪曲虜騎三秋入闗雲萬里平雪似胡沙暗氷如漢月明高闕銀為闕長城玉作城節旄零落盡天子不知名昭君怨合殿恩中絶交河使漸稀肝腸辭玉輦形影向金徽漢地草應綠胡庭沙正飛願逐三秋鴈年年一度歸折楊栁倡樓啓曙扉楊栁正依依鶯啼知嵗隔條變識春歸露葉凝愁黛風花落舞衣攀折将安寄軍中音信稀梅花落梅嶺花初發天山雪未開雪處疑花滿花邉似雪迴因風入舞袖雜粉向妝臺匈奴幾萬里春至不知來闗山月塞垣通碣石虜障抵祁連相思在萬里明月正孤懸影移金岫北光㫁玉門前寄言閨中婦愁看鴻鴈天上之回回中道路險蕭闗烽候多五營屯右地萬乗出西河單于拜玉璽天子按雕戈振旅汾川曲秋風横大歌紫騮馬騮馬照金鞍轉戰入臯蘭塞門風稍急長城水正寒雪暗鳴珂重山長噴玉難不辭橫絶漠流血幾時乾戰城南将軍出紫塞冒頓在烏貪笳喧鴈門北陣翼龍城南琱弓夜宛轉鐡騎曉驂驔應須駐白日為待戰方酣十五夜觀燈錦里開芳宴蘭缸艶早年縟彩遙分地繁光逺綴天接漢疑星落依樓似月懸别有千金笑來映九枝前入秦川界隴阪長無極蒼山望不窮石徑縈疑㫁回流映似空花開綠野霧鶯囀紫巖風春芳勿遽盡留賞故人同文翁講堂錦里淹中館岷山稷下亭空梁無燕雀古壁有丹青槐落猶疑市苔深不辨銘良哉二千石江漢表遺靈相如琴臺聞有雍容地千年無四鄰園院風煙古池臺松檟春雲疑作賦客月似聴琴人寂寂啼鶯處空傷遊子神石鏡寺古墓芙蓉塔神銘松柏煙鸞沈仙鏡底花沒梵輪前銖衣千古佛寳月兩重圓隠隠香臺夜鐘聲徹九天辛法司宅觀伎南國佳人至北堂羅薦開長裙隨鳯管促柱送鸞杯雲光身後落雪態掌中回到愁金谷晚不怪玉山頽春晚山莊率題二首顧步三春晩田園四望通遊絲橫惹樹戲蝶亂依叢竹懶偏宜水花狂不待風唯餘詩酒意當了一生中田家無四隣獨坐一園春鶯啼非選樹魚戲不驚綸山水彈琴盡風花酌酒頻年華巳可樂高興復留人江中望月江水向涔陽澄澄寫月光鏡圓珠溜徹弦滿箭波長沈鈎搖兔影浮桂動丹芳延照相思夕千里共霑裳元日述懐筮仕無中秩歸耕有外臣人歌小嵗酒花舞大唐春草色迷三徑風光動四鄰願得長如此年年物候新益州城西張超亭觀伎落日明歌席行雲逐舞人江前飛暮雨梁上下輕塵冶服看疑畫妝樓望似春高車勿遽返長袖欲相親還京贈别風月清江夜山水白雲朝萬里同為客三秋契不凋戲鳬分斷岸歸騎别髙標一去仙橋道還望錦城遙至陳倉曉晴望京邑拂曙驅飛傳初晴帶曉涼霧歛長安樹雲歸仙帝鄉澗流漂素沫巖景靄朱光今朝好風色延瞰極天莊晚渡滹沱敬贈魏大津谷朝行逺冰川夕望曛霞明深淺浪風捲去來雲澄波泛月影激浪聚沙文誰忍仙舟上攜手獨思君和吳侍御被使燕然春歸龍塞北騎指鴈門垂胡笳折楊栁漢使採燕支戍城聊一望花雪幾參差闗山有新曲應向笛中吹七夕泛舟二首汀葭肅徂暑江樹起初涼水疑通織室舟似泛仙潢連橈渡急響鳴棹下浮光日晩菱歌唱風煙滿夕陽鳯杼秋期至鳬舟野望開微吟翠塘側延想白雲隈石似支機罷槎疑犯宿來天潢殊漫漫日暮獨悠哉送梓州髙叅軍還京京洛風塵逺褒斜煙霧深北遊君似智南飛我異禽别路琴聲斷秋山猿鳥吟一乖青巖酌空佇白雲心大劒送别劉右史金碧禺山逺闗梁蜀道難相逢屬晚嵗相送動征鞍地咽綿州冷雲凝劍閣寒倘遇忠孝所為道憶長安盧昇之集巻二欽定四庫全書盧昇之集巻三唐盧照隣撰
