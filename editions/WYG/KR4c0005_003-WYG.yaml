body:
  text: 五言排律同臨津紀明府孤鴈三秋違北地萬里向南翔河洲花稍白闗塞葉初黄避繳風霜勁懐書道路長水流疑箭動月照似弓傷横天無有陣度海不成行㑹刷能鳴羽還赴上林鄉西使兼送孟學士南遊地道巴陵北天山弱水東相看萬餘里共倚一征蓬零雨悲王粲清樽别孔融徘徊聞夜鶴悵望待秋鴻骨肉胡秦外風塵闗塞中唯餘劒鋒在耿耿氣成虹送鄭司倉入蜀離人丹水北游客錦城東别意還無巳離憂自不窮隴雲朝結陣江月夜臨空闗塞疲征馬霜氛落早鴻潘年三十外蜀道五千中送君秋水曲酌酒對秋風綿州官池贈别同賦灣字輶軒遵上國仙佩一作氣下靈闗尊酒方無地聫綣喜暫攀誰言欲贈策高辯正連環野徑浮雲斷荒池春草斑殘花落古樹度鳥入澄灣欲叙他鄉别幽谷有綿蠻還赴蜀中貽示京邑遊好籞宿花初滿章臺栁向一作尚飛如何正此日還望昔多違悵别風期阻将乖雲㑹稀斂袵辭丹闕懸旌陟翠微野禽喧戍鼔春草變征衣回顧長安道闗山起夕霏初夏日幽莊聞有高蹤客耿介坐幽莊林壑人事少風煙鳥路長瀑水含秋氣垂藤引夏涼苗深全覆隴荷上半侵塘釣渚青鳬沒村田白鷺翔知君振奇藻還嗣海隅芳山荘休沐蘭署乘閒日蓬扉狎遁棲龍柯疎玉井鳳葉下金隄川光搖水箭山氣上雲梯亭幽聞唳鶴牕曉聴鳴雞玉軫臨風奏瓊漿映日攜田家自有樂誰肯謝青谿山林休日田家歸休乘暇日饁稼返秋塲徑草疎王篲巖枝落帝桑耕田虞訟寝鑿井漢機忘戎葵朝委露齊棗夜含霜南澗泉初洌東籬菊正芳還思北牕下高卧偃羲皇宴梓州南亭得池字二條開勝跡大隠叶沖規亭閣分危岫樓臺繞曲池長薄秋煙起飛梁古蔓垂水鳥翻荷葉山蟲咬一作交桂枝遊人惜将晚公子愛忘疲願得迴三舎琴樽長若斯山行寄劉李二叅軍萬里煙塵客三春桃李時事去紛無限愁來不自持狂歌欲歎鳳失路反占龜草礙人行緩花繁鳥度遲彼美參卿事留連求友詩安知倦遊子兩鬢漸如絲首春貽京邑文士寂寞罷将迎門無車馬聲横琴答山水披巻閱公卿忽聞嵗云宴倚杖出簾楹寒辭楊栁陌春滿鳯凰城梅花扶院吐蘭葉繞階生覽鏡改容色藏書留姓名時來不假問生死任交情贈許左丞從駕萬年宫聞道上之回詔蹕下蓬萊中樞移北斗左轄去南臺黄山聞鳳笛清蹕侍龍媒曳日朱旗巻參雲金障開朝驂五城栁夕宴柏梁杯漢畤光如月秦祠聴似雷寂寂芸香閣離思獨悠哉晚渡渭橋寄示京邑遊好我行背城闕驅馬獨悠悠寥落百年事徘徊萬里憂途遙日向夕時晚鬢将秋滔滔俯東逝耿耿泣西浮長虹掩釣浦落鴈下星洲草變黄山曲花飛清渭流迸水驚愁鷺騰沙起狎鷗一赴清泥道空思𤣥灞遊羈臥山中臥壑迷時代行歌任死生紅顏意氣盡白璧故交輕澗戶無人跡山牕聴鳥聲春色緣巖上寒光入溜平雪盡松帷暗雲開石路明夜伴飢鼯宿朝隨馴雉行度溪猶憶處尋洞不知名紫書常日閱丹藥幾年成扣鐘鳴天鼓燒香厭地精倘遇浮邱鶴飄飄凌太清酬張少府柬之昔余與夫子相遇漢川隂珠浦龍猶臥檀溪馬正沈價重瑤山曲詞驚丹鳯林十年暌賞慰萬里隔招尋毫翰風期阻荆衡雲路深鵬飛俱望昔蠖屈共悲今誰謂青衣道還歎白頭吟地接神仙磵江連雲雨岑飛泉如散玉落日似懸金重以瑤華贈空懐舞詠心過東山谷口不知名利險辛苦滯皇州始覺飛塵倦歸來事綠疇桃源迷處所桂樹可淹留跡異人間俗禽同海上鷗古苔依井被新乳傍崖流野老堪成鶴山神或化鳩泉鳴碧澗底花落紫巖幽日暮餐龜殻天寒御鹿裘不辨秦將漢寧知春與秋多謝青溪客去去赤松遊送幽州陳叅軍赴任寄呈鄉曲父老薊北三千里闗西二十年馮唐猶在漢樂毅不歸燕人同黄鶴逺鄉共白雲連郭隗池臺處昭王樽酒前故人當已老舊壑幾成田紅顔如昨日衰鬢似秋天西蜀橋應毁東周石尚全灞池水猶綠榆闗月早圓塞雲初上鴈庭樹欲銷蟬送君之舊國揮淚獨􅏰然哭金部韋郎中金曹初受拜玉地始含香翻同五日尹遽見一星亡賀客猶扶路哀人遂上堂歌筵長寂寂哭泣自蒼蒼嵗時賓徑斷朝暮雀羅張書留魏主闕魂掩漢家牀徒令永平帝千載罷撞郎哭明堂裴主簿締歡三十載通家數百年潘楊稱代穆秦晉忝姻連風雲洛陽道花月茂陵田相悲共相樂交騎復交筵始謂調金鼎如何掩玉泉黄公酒壚處青眼竹林前故琴無復雪新樹但生煙遽痛蘭襟斷徒令寳劍懸客散同秋葉人亡似夜川送君一長慟松臺路幾千同崔錄事哭鄭員外文學秋天逺郎官星位尊伊人表時彦飛譽滿司存楚席光文雅瑤山侍討論鳯詞凌漢閣龜辯罩周園已陪東嶽駕將逝北溟鯤如何萬化盡空歎九飛魂白馬西京驛青松北海門夜臺無曉箭朝奠有虚尊一代儒風沒千年隴霧昏梁山送夫子湖水弔王孫僕本多悲淚沾裳不待猿聞君絶絃曲吞恨更無言五言絶句登玉清絶頂横臨日孤峯半倚天徘徊拜真老萬里見風煙曲池荷浮香繞曲岸圓影覆華池常恐秋氣早飄零君不知浴浪鳥獨舞依磐石羣飛動輕浪奮迅碧沙前長懐白雲上階下竹封霜連錦砌防露拂瑤階聊将儀鳳質暫與俗人諧含風蟬髙情臨爽月急響送秋風獨有危冠意還將衰鬢同葭川獨泛倚棹春江上橫舟石岸前山暝行人㫁迢迢獨泛仙送二兄入蜀闗山客子路花栁帝王城此中一分手相顧憐無聲宿𤣥武二首方池開曉色圓月下秋陰已乘千里興還撫一絃琴庭搖北風栁院繞南溟禽累宿恩方重窮秋歎不深九隴津集落落樹陰紫澄澄水華碧復有翻飛禽徘徊疑曳舄遊昌化山精舍寳地乘峰出香臺接漢高稍覺真途近方知人事勞七言絶句登封大酺歌四首明君封禪日重光天子垂衣厯數長九州四海常無事萬嵗千秋樂未央日觀仙雲隨鳯輦天門瑞雪照龍衣繁絃綺席方終夜妙舞清歌歡未歸翠鳯逶迤登介丘仙鶴徘徊天上遊借問乾封何所樂人皆夀命得千秋千年聖主應昌期萬國淳風王化基請比上古無為代何如今日太平時九月九日登𤣥武山旅眺九月九日眺山川歸心歸望積風煙他鄉共酌金花酒萬里同悲鴻鴈天王勃蜀中九日登𤣥武山旅望附九月九月望鄉臺他席他鄉送客杯人情巳厭南中苦鴻鴈那從北地來邵大震九月九日登𤣥武山旅眺附九月九日望遙空秋水秋天生夕風寒鴈一向南飛逺遊人幾度菊花叢樂府中和樂九章歌登封第一炎圖喪寳黄厯開璿祖武類帝宗文配天玉鑾垂日翠華凌煙東雲干吕南風入絃山稱萬嵗河慶千年金繩永結麗璧長懸歌明堂第二穆穆聖皇雍雍明堂左平右墄上圓下方調均風雨制度陰陽四牕八達五室九房南通夏火西瞰秋霜天子臨御萬玉鏘鏘歌東軍第三遐哉廟略赫矣台臣横戈碣石倚劒浮津風丘拂籜日域清塵島夷復祀龍伯來賓休兵㝢縣獻馘天闉斾海凱入耀輝震震歌南郊第四䖍郊上帝肅事圜丘龍駕四牡鸞旗九斿鍾歌晩引紫煬髙浮日麗蒼璧雲飛鳴球皇之慶矣萬壽千秋歌中宫第五祥遊沙麓慶洽瑤衣黄雲晝聚白氣宵飛居中履正稟和體微儀型赤縣演教椒闈陶鈞萬國丹青四妃河洲在詠風化攸歸歌儲宫第六波澄少海景麗前星髙禖誕聖甲觀昇靈承規翠戺問寢瑤庭宗儒側席問道横經山賓皎皎國胄青青黄裳元吉邦家以寧歌諸王第七星陳帝子嶽列天孫義光帶礪象著乾坤我有明徳利建攸存苴以茅社錫以犧樽藩屛王室翼亮堯門八才兩獻夫何足云歌公卿第八蹇蹇三事師師百寮羣龍在職振鷺盈朝豐金輝首佩玉鳴腰青蒲翼翼丹地翹翹歌雲佐漢捧日匡堯天工人代邈邈昭昭總歌第九明明天子兮聖徳揚穆穆皇后兮陰化康登若木兮坐明堂池濛氾兮家扶桑武化偃兮文化昌禮樂昭兮股肱良君臣已定兮君永無疆顔子更生兮徒皇皇若有人兮天一方忠為衣兮信為裳餐白玉兮飲瓊芳心思荃兮路阻長盧昇之集巻三欽定四庫全書盧昇之集巻四唐盧照隣撰
