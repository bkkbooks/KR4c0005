body:
  text: 騷五悲幷序自古為文者多以九七為題目乃有九歌九辨九章七發七啓其流不一余以為天有五星地有五嶽人有五章一作常禮有五禮樂有五聲五者亦在天地之數今造五悲以申萬物之情傳之好事耳悲才難一悲曰恭聞古之君子兮將逺適乎百蠻何故違父母之中國從禽獸于末班將矯詞兮不往將背俗兮不還寧曲成而薄喪不直敗以厚顏彼聖人兮猶若此況不肖與中間古往今來邈矣悠哉嵇生玉折顔子蘭摧人兮代兮俱盡代兮人兮共哀至如左邱失明冉耕有疾兵法作而斷足史記修而下室髙明者鬼瞰其門正直者人怨其筆雖為鏡於前代終抱痛於今日别有漢陽計掾邠國臺卿抗希代之奇節負超時之令名坎壈九死離披再生伊才智之為患故賢哲之所嬰若乃賈長沙之數奇崔亭伯之不偶思欲削魯史之髙行鉗楊墨之辨口為書為禮驅季俗於三古之前垂譽垂聲正頽綱於百王之後天子聞之而欲用羣公畏之而莫取徒窘蠢于泥沙竟龍鍾于塵垢异乎稽之古人則如彼考之今代又如此近有魏郡王君曰方華陰楊氏曰亨咸能博達奇偉覃思研精徵孔門之禮樂吞鬼谷之縱横岳秀泉澄如川如陵髙談則龍騰豹變下筆則煙飛霧凝王則官終于郡吏楊則官止於邑丞何異夫操太阿以烹小鮮飛夜光而彈伏翼灼金龜兮訪兆邀玉騏兮騁力雖勞形而竭思吾固知其不得余之昆兮曰杲之余之季兮曰昂之杲也杲杲兮如三足之鳥昂也昂昻焉如千里之駒杲之為人也風流儒雅為一代之和玉昻之為人也文章卓犖為四海之隋珠並蘭馨兮桂馥俱龍駒兮鳳雛生於戰國則管樂之器長於闕里則游夏之徒以方圓異用遭遇殊時故才髙而位下咸默默以遲遲青青子襟兮時向晚黄黄我綬兮鬢如絲昆兮何責坐乾封兮老矣季兮何負横武陵而棄之舉天下兮稱屈何暗室之足期為小人之所笑為通賢之所悲童子尚知其不可矧衡鏡與蓍龜故曰至道之精窅窅㝠㝠至道之極昏昏黙黙焚符破璽而人朴鄙剖斗折衡而人不爭攦工倕之指而天下始巧膠離婁之目而天下始明然後除其矯黠之患安其性命之精太平之代萬物肫肫凡聖脗合賢愚淆昏公卿不接友長吏不迎尊當成康勿用何暇談其兵甲典謨既作焉得耀其書論雖有晏嬰子産將頓伏於閭巷雖有冉求季路且耕牧於田園彼尋常之才子又焉可以勝言命鸞鳳兮逐雀驅龍驥兮捕鼠使掌事者校其功兮孰能與狸隼而齊舉金為舟兮瑇瑁檝不可以涉邱陵些珠為衣兮翡翠裳不可以混樵蒸些何器用之乖刺悼斯人之勤奓倚長巖以為枕兮吸流光以髙臥見城市以盈虚若蚊蝱之相過當其時也巢由滿野不知稷卨之尊周召盈朝莫救夷齊之餓若夫管仲不遇齊桓則城陽之贅壻太公不遭姬伯亦棘津之漁夫一仁一義柴也來兮由也醢一忠一孝微子去之箕子奴聖人百慮而一致君子同歸而殊途推既焚兮胥既溺桀亦放兮文亦拘笙簧六籍則秦俗有坑儒之痛黼藻百行則漢家有黨錮之誅鄴都傾覆飛禍纒於髙鼻洛陽板蕩横死坐其無鬚喔吚㗚嘶口含天憲睚眦蠆分屍僵路隅變化與屈伸交逐窮達與存亡竝驅因其所有而有之則萬物無不有就其所無而無之則萬物無不無有竅而生寧唯混沌無用而飽何獨侏儒是以蘧伯玉巻兮長巻寗武子愚兮更愚庭有樹兮樹有荆園有鳥兮鳥有鴒鴒其鳴矣思諸兄矣荆其顇矣思其季矣巖有芳桂隰有棠棣枝巄嵷兮相樛葉翩翻兮相翳天之生我寧胡不惠何如吉兮初征悲終凶於未濟悲窮道二悲曰淚流公子傷心久之厯萬古以抽恨横八荒而選悲有幽巖之臥客兀中林而坐思形枯槁以崎嶬足聫踡以緇釐悄悄兮忽愴眇眇兮惆悵迢遙兮獨蹇淹留兮空谷天片片而雲愁山幽幽而谷哭露垂泣於幽草風含悲於古木徒觀其頂集飛塵凥埋積雪骸骨半死血氣中絶四支萎隨五官欹缺皮襞積而千皺衣聫褰而百結毛落鬢禿無叔子之明眉唇亡齒寒有張儀之羞舌仰而視睛翳其若瞢俯而動身羸而欲折神若存而若亡心不生而不滅其所居也不爨其所狎也非人古樹為伴朝霞作隣下陰森以多晦傍恍惚兮無垠松門草合石路苔新公子方撫其背而曵其裾曰子非有唐之文士與燕地之髙門與昔也子之少則玉葉金枝及其長則龍章鳳姿立身則淹中不足言其禮揮翰則江左莫敢論其詩每兢兢于暗室恒詡詡于明時常謂五府交辟三臺共推朝紆㑹稽之綬夕獻長楊之詞痛私門之禍速惜公車之詔遲豈期晦明乖序寒燠愆度鱗傷羽折筋攣肉蠧離披於丹澗之隅觳觫於藪山之路巳焉哉巳焉哉崑山玉石忽摧頽事去矣事去矣今古聖賢悲何已天道如何自古相嗟項羽帳中之飲荆卿易水之歌何壯夫之懦抑伊兒女之情多借如蘇武生還温序死節王陵之母伏劔杞梁之妻泣血事蓋迫於功名情有兼於貞烈若闗侯漢陰田橫海島孤城已迫疲兵向老離離碣石之鴻羃羃江潭之草迴首永訣吞聲何道及夫獻帝偷生懐王客死哀西都之城闕憶南京之朝市鳳凰樓上隴山雲鸚鵡洲前呉江水一離一别兮漢家宫掖似神仙獨坐獨愁兮楚國容華競桃李别有士安多疾顔竒不起馬援困於壺頭冉耕悲於牖裏平生書劔宿昔琴樽硏精殫于玉冊慱思浹于銅渾思欲為龜為鏡立徳立言成天下之亹亹定古今之諄諄一朝溘臥萬事寧論君徒見邱中之饒朽骨豈知陌上之有遊魂假使百年兮上夀又何足以存存悲昔遊三悲曰竒峰合沓半隠天綠蘿䝉蘢水潺湲因嵌巖以爲室就芬芳以列筵川谷縈廻兮迷徑路山嶂重復兮無人煙當􅞛谺之洞壑臨決咽之奔泉中有幽憂之子長寂寞以思禪暮色蹐蹐朝思綿綿形半生而半死氣一絶而一連自言少年遊宦來從北燕淮南芳桂之嶺峴北明珠之川東魯則過仲尼之故宅西蜀則耕武侯之薄田舊鄉舊國白雲邊飛雪飛蓬暗逺天暫辭薊北三千里少别昭邱三十年昔時人物都應謝聞道城隍復可憐忽憶揚州揚子津遙思蜀道蜀橋人鴛鴦渚兮羅綺月茱萸灣兮楊栁春煙波淼淼帶平沙閣棧連延狹復斜山頭交讓之木浦口同心之花嚴君平之卜肆戴安道之貧家月犯少微弔呉中之隠士星干織女乘海上之仙槎長安綺城十二重金作鳳凰銅作龍蕩蕩千門如錦繡巖巖雙闕似芙蓉題字於扶風之柱繫馬於驪山之松灞池則金人列岸太華則玉女臨峰平明共戲東陵陌薄暮遙聞北闕鐘洛陽大道何紛紛榮光休氣曉氛氲交衢近接東西署複道遙通南北軍漢帝能拜嵩邱石陳王巧賦洛川雲河水河橋木蘭栧金閨金谷石榴裙曽入西城㸔歌舞也出東郊送使君一朝憔悴無氣力曝骸委骨龍門側當時相重若鴻鐘今日相輕比蟬翼代情兮共此何余哀之能得使我孤猿哀怨獨鶴驚鳴蘿月寡色風泉罷聲嗟昊天之不弔悲后土之無情松架森沈兮户内掩石樓摧折兮柱将傾竊不敢當雨露之恩惠長痛恨于此生悲今日四悲曰傾蓋若舊白頭如新嘗為談過其實辨而非真自高枕箕潁長揖交親以蕙蘭為九族以風煙為四鄰朝朝獨坐惟見羣峰合沓年年孤臥常對古樹輪囷相弔相哭則有飢鼯啼夜相慶相賀則有好鳥歌春林麌麌兮多鹿山蒼蒼兮少人時向南溪汲水或就東巖負薪百年之中皆為白骨千里之外時見黄塵平生連袂宿昔銜杯談風雲於城闕㺯花鳥於池臺皆是西園上客東觀髙才超班匹賈含鄒吐枚一琴一書校奇蹤於既往一歌一詠垂妙製於将來絃將調而雪舞筆屢走而雲迴自謂蘭交永合松契長幷通宵扼腕終日盱衡罵蕭朱為賈豎目張陳為老兵悲蒼黄兮驟變恨消長之相傾貴而不驕人皆共推晏平仲死而不朽吾每獨稱范巨卿及其蹇産摧聫支離括撮已濡首兮将死尚揺尾兮求活荘西貸而魚窮姬東徂而狼跋今皆慶弔都斷存亡永濶憑駟馬而不追寄雙魚而莫達向時之清談尚在今日之相知巳末則有河瀆漂母隴上樵夫盤餐帶粟粥麪兼麩藜羮一簋濁酒一壺夫負妻戴男歡女娯攀重巒之岝㟧厯飛澗之﨑嶇哀王孫而進饋問公子之所須因謂余曰可憐可憐聖人之過久矣君子之罪多焉詩書禮樂適足衰人之神用宗族朋友不足駐人之頽年削跡伐樹孔席由來不暖摩頂至足墨突何時有煙一朝至此萬事徒然自昔相逢把臂談𤣥横雕龍於翠瓦飛縞鳳於瓊筵各自雲騰羽化谷變鶯遷鳴香車於闕下曳珠履於君前豈憶荒山之幽絶寧知枯骨之可憐傳與千秋萬古寄言白日黄泉雖有羣書萬巻不及囊中一錢悲人生五悲曰禮樂既作仁義不􅄽死生有命富貴在天一變一化一虧一全去其外物歸於内篇儒與道兮方計於前其書萬巻其學千年鐘鼔玉帛蹩躠􅹿躚金木水火混合推遷六合之内慕其風兮如市百代之後隨其流兮若川三界九地徃返周旋四生六道出沒牽聫硠硠磕磕蠢蠢翾翾受苦受樂可悲可憐有超然之大聖厯曠刼以為期戒定慧解非因人慈悲喜捨非見思聞儒道之髙論乃撞鐘而應之曰止止善男子觀向時之華說乃天下之辨士請弄宜僚之丸以合兩家之美若夫正君臣定名色威儀俎豆郊廟社稷適足誇耀時俗奔競功名使六義相亂四海相爭我者遺其無我生者哀其無生孰與乎身肉手足濟生人之塗炭國城府庫恤貧者之經營捨其有愛以至於無愛捨其有行以至於無行若夫呼吸吐納全身養精反於太素飛騰上清與乾坤合其徳與日月合其明適足増長諸見未能永證無生孰與夫離常離㫁不始不終恒在三昧常遊六通不生不住無所處不去不滅無所窮放毫光而普照盡法界與虚空苦者代其勞苦䝉者導其愚蒙施語行事未嘗稱倦根力覺道不以為功所言未畢儒道二客離席再拜稽首而稱曰大聖哉邱晩聞道耼今巳老徒知其一未究其術何異夫戴盆望天倚杖逐日蒼蒼之氣未辨昭昭之光巳失嗚呼優優羣品遑遑衆人雖鑿其竅未知其身來遊何道去止何津誰為其業誰作其因一翻一覆兮如掌一生一死兮若輪不有大聖誰起大悲請北面而趨伏願終身而教之獄中學騷體夫何秋夜之無情兮皎皛悠悠而太長圜户杳其幽邃兮愁人披此嚴霜見河漢之西落聞鴻鴈之南翔山有桂兮桂有芳心思君兮君不将憂與憂兮相積歡與歡兮兩忘風嫋嫋兮木紛紛凋落葉兮吹白雲寸步千里兮不相聞思公子兮日将曛林已暮兮鳥羣飛重門掩兮人徑稀萬族皆有所託兮蹇獨淹留而不歸盧昇之集巻四欽定四庫全書盧昇之集巻五唐盧照隣撰騷二
